<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Localizer</title>
    <meta name="description" content="Offline, single-file tool to compose game UI images and generate localized versions for many languages.">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary-color: #6b7280;
            --secondary-color: #4b5563;
            --accent-color: #9ca3af;
            --dark-bg: #050505;
            --light-bg: #19191b;
            --panel-bg: #121214;
            --surface-2: #202024;
            --surface-3: #2a2a2f;
            --border: #2e2e33;
            --text-light: #fff;
            --text-dim: #9ca3af;
            --text-mute: #6b7280;
            --danger: #c0564b;
            --warn: #d8a657;
            --ok: #7faa6e;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.45);
            --radius: 3px;
            --head-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            --body-font: Verdana, Geneva, 'DejaVu Sans', Arial, sans-serif;
        }

        html, body { height: 100%; }
        body {
            font-family: var(--body-font);
            color: var(--text-light);
            background: var(--dark-bg);
            overflow: hidden;
            font-size: 13px;
            line-height: 1.4;
            user-select: none;
            -webkit-user-select: none;
        }
        h1, h2, h3, h4 { font-family: var(--head-font); font-weight: 600; }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--dark-bg); }
        ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 6px; border: 2px solid var(--dark-bg); }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-color); }

        #app { display: flex; flex-direction: column; height: 100vh; }

        /* ---------- Top toolbar ---------- */
        .topbar {
            display: flex; align-items: center; gap: 16px;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border);
            padding: 6px 12px; flex-wrap: wrap;
        }
        .brand {
            font-family: var(--head-font); font-weight: 700; font-size: 14px;
            display: flex; align-items: center; gap: 8px; margin-right: 8px; white-space: nowrap;
        }
        .brand .logo { font-size: 18px; }
        .tb-group { display: flex; align-items: center; gap: 6px; padding: 0 8px; border-right: 1px solid var(--border); }
        .tb-group:last-child { border-right: none; }
        .tb-group .lbl { color: var(--text-mute); font-size: 10px; text-transform: uppercase; letter-spacing: .06em; margin-right: 4px; }

        button, .btn {
            font-family: var(--body-font); font-size: 12px;
            background: var(--surface-2); color: var(--text-light);
            border: 1px solid var(--border); border-radius: var(--radius);
            padding: 6px 10px; cursor: pointer; transition: all 0.15s ease;
            display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
        }
        button:hover, .btn:hover { background: var(--surface-3); border-color: var(--primary-color); }
        button:active { transform: translateY(1px); }
        button.primary { background: var(--primary-color); border-color: var(--primary-color); }
        button.primary:hover { background: var(--secondary-color); }
        button.danger:hover { background: var(--danger); border-color: var(--danger); }
        button.icon { padding: 6px 8px; }
        button.toggle.on { background: var(--primary-color); border-color: var(--primary-color); }
        .tb-num { width: 50px; background: var(--surface-2); color: var(--text-light); border: 1px solid var(--border); border-radius: var(--radius); padding: 5px 4px; font-size: 12px; -moz-appearance: textfield; }
        .tb-num:focus { outline: none; border-color: var(--primary-color); }
        button:disabled { opacity: .4; cursor: not-allowed; }
        button:disabled:hover { background: var(--surface-2); border-color: var(--border); }
        .sep { flex: 1; }

        /* ---------- Workspace ---------- */
        .workspace { flex: 1; display: flex; min-height: 0; }
        .dock { background: var(--panel-bg); display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
        .left-dock { width: 280px; border-right: 1px solid var(--border); }
        .right-dock { width: 320px; border-left: 1px solid var(--border); }
        .resizer { width: 5px; cursor: col-resize; background: transparent; flex: 0 0 auto; }
        .resizer:hover { background: var(--primary-color); }

        .dock-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--dark-bg); }
        .dock-tab {
            flex: 1; text-align: center; padding: 8px 4px; font-size: 11px; cursor: pointer;
            color: var(--text-dim); border-bottom: 2px solid transparent; text-transform: uppercase; letter-spacing: .04em;
        }
        .dock-tab.active { color: var(--text-light); border-bottom-color: var(--primary-color); background: var(--panel-bg); }
        .dock-body { flex: 1; overflow-y: auto; min-height: 0; }
        .dock-panel { display: none; flex-direction: column; height: 100%; }
        .dock-panel.active { display: flex; }

        .panel-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 10px; border-bottom: 1px solid var(--border);
            font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-dim);
            position: sticky; top: 0; background: var(--panel-bg); z-index: 2;
        }
        .panel-head .actions { display: flex; gap: 3px; }
        .panel-head .actions button { padding: 3px 6px; font-size: 11px; }

        /* ---------- Hierarchy / layers ---------- */
        .layer-list { padding: 4px; display: flex; flex-direction: column; gap: 2px; }
        .layer {
            display: flex; align-items: center; gap: 6px; padding: 5px 6px; border-radius: var(--radius);
            background: var(--surface-2); cursor: pointer; border: 1px solid transparent;
        }
        .layer:hover { background: var(--surface-3); }
        .layer.selected { background: rgba(107,114,128,.35); border-color: var(--primary-color); }
        .layer.dragover-top { box-shadow: inset 0 2px 0 var(--accent-color); }
        .layer.dragover-bottom { box-shadow: inset 0 -2px 0 var(--accent-color); }
        .layer .ico { width: 16px; text-align: center; opacity: .8; flex: 0 0 auto; }
        .layer .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .layer .nm input { width: 100%; background: var(--dark-bg); border: 1px solid var(--primary-color); color: #fff; padding: 2px 4px; border-radius: 2px; font-size: 12px; }
        .layer .vis, .layer .lock { opacity: .55; cursor: pointer; width: 18px; text-align: center; flex: 0 0 auto; }
        .layer .vis:hover, .layer .lock:hover { opacity: 1; }
        .layer .layer-del { opacity: 0; cursor: pointer; width: 18px; text-align: center; flex: 0 0 auto; font-size: 13px; transition: opacity .1s; }
        .layer:hover .layer-del { opacity: .45; }
        .layer:hover .layer-del:hover { opacity: 1; color: var(--danger); }
        .layer.is-hidden { opacity: .45; }
        .layer.is-hidden .nm { text-decoration: line-through; }
        .layer.locked { opacity: .85; }
        .layer .ico.thumb, .layer .ico.swatch { width: 22px; height: 22px; border-radius: 3px; overflow: hidden; opacity: 1; flex: 0 0 auto; }
        .layer .ico.thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .layer .ico.swatch { border: 1px solid var(--border); }
        .layer .key-chip { flex: 0 0 auto; max-width: 92px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 9px; font-family: ui-monospace, 'DejaVu Sans Mono', monospace; color: var(--accent-color); background: var(--surface-3); border-radius: 8px; padding: 1px 6px; }
        .empty-hint { padding: 16px; color: var(--text-mute); text-align: center; font-size: 12px; line-height: 1.6; }

        /* ---------- Assets ---------- */
        .asset-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 10px; }
        .asset {
            background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 6px; cursor: grab; text-align: center; position: relative; overflow: hidden;
        }
        .asset:hover { border-color: var(--primary-color); }
        .asset .thumb { width: 100%; height: 70px; object-fit: contain; background:
            conic-gradient(#1a1a1a 90deg, #161616 90deg 180deg, #1a1a1a 180deg 270deg, #161616 270deg) 0 0 / 16px 16px;
            border-radius: 2px; display: block; }
        .asset .nm { font-size: 10px; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-dim); }
        .asset .del { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,.6); border: none; border-radius: 2px; padding: 1px 5px; font-size: 11px; opacity: 0; }
        .asset:hover .del { opacity: 1; }
        .dropzone { margin: 10px; border: 1.5px dashed var(--border); border-radius: var(--radius); padding: 16px; text-align: center; color: var(--text-mute); font-size: 12px; cursor: pointer; }
        .dropzone:hover, .dropzone.over { border-color: var(--primary-color); color: var(--text-light); background: var(--surface-2); }

        /* ---------- Center / canvas ---------- */
        .center { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--dark-bg); }
        .page-tabs { display: flex; align-items: center; gap: 2px; padding: 6px 8px 0; background: var(--panel-bg); border-bottom: 1px solid var(--border); overflow-x: auto; }
        .page-tab {
            display: flex; align-items: center; gap: 6px; padding: 7px 10px; cursor: pointer; white-space: nowrap;
            background: var(--surface-2); border: 1px solid var(--border); border-bottom: none;
            border-radius: var(--radius) var(--radius) 0 0; color: var(--text-dim); font-size: 12px;
        }
        .page-tab.active { background: var(--dark-bg); color: var(--text-light); border-color: var(--primary-color); border-bottom: 1px solid var(--dark-bg); margin-bottom: -1px; }
        .page-tab .pt-name[contenteditable] { outline: none; }
        .page-tab .pt-close { opacity: .5; padding: 0 2px; border-radius: 2px; }
        .page-tab .pt-close:hover { opacity: 1; color: var(--danger); }
        .page-add { padding: 7px 10px; cursor: pointer; color: var(--text-dim); background: transparent; border: none; }
        .page-add:hover { color: #fff; background: transparent; }

        .lang-bar { display: flex; align-items: center; gap: 10px; padding: 6px 10px; background: var(--panel-bg); border-bottom: 1px solid var(--border); }
        .lang-bar select { min-width: 130px; }
        .lang-bar .warn-pill { color: var(--warn); font-size: 11px; display: none; align-items: center; gap: 5px; }
        .lang-bar .warn-pill.show { display: inline-flex; }

        .canvas-wrap { flex: 1; position: relative; overflow: hidden; min-height: 0;
            background:
              linear-gradient(45deg, #0b0b0c 25%, transparent 25%),
              linear-gradient(-45deg, #0b0b0c 25%, transparent 25%),
              linear-gradient(45deg, transparent 75%, #0b0b0c 75%),
              linear-gradient(-45deg, transparent 75%, #0b0b0c 75%);
            background-size: 24px 24px; background-position: 0 0, 0 12px, 12px -12px, -12px 0px; background-color: #080809;
        }
        .stage { position: absolute; left: 0; top: 0; transform-origin: 0 0; }
        .stage canvas { display: block; box-shadow: 0 0 0 1px var(--border), var(--shadow-lg); image-rendering: auto; }
        .overlay { position: absolute; inset: 0; pointer-events: none; }
        .sel-box { position: absolute; border: 1px solid var(--accent-color); pointer-events: none; box-sizing: border-box; }
        .sel-box.warn { border-color: var(--warn); }
        .safe-box { position: absolute; border: 1px dashed rgba(156,163,175,.5); pointer-events: none; box-sizing: border-box; }
        .handle { position: absolute; background: var(--text-light); border: 1px solid var(--primary-color); width: 10px; height: 10px; pointer-events: all; box-sizing: border-box; }
        .handle.rot { border-radius: 50%; background: var(--accent-color); cursor: grab; }
        .handle.nw, .handle.se { cursor: nwse-resize; }
        .handle.ne, .handle.sw { cursor: nesw-resize; }
        .handle.n, .handle.s { cursor: ns-resize; }
        .handle.e, .handle.w { cursor: ew-resize; }
        .rot-line { position: absolute; width: 1px; background: var(--accent-color); pointer-events: none; }
        .marquee { position: absolute; border: 1px solid var(--accent-color); background: rgba(156,163,175,.12); pointer-events: none; }

        .canvas-ctrl { position: absolute; bottom: 10px; left: 10px; display: flex; gap: 4px; z-index: 5; }
        .canvas-ctrl-r { position: absolute; bottom: 10px; right: 10px; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; z-index: 5; }
        .canvas-ctrl-r .zoom-row { display: flex; align-items: center; gap: 4px; }
        .canvas-ctrl button, .canvas-ctrl-r button, .canvas-ctrl-r .zoom-lbl {
            padding: 5px 9px; font-size: 13px;
            background: rgba(18,18,20,.82); backdrop-filter: blur(4px); border-color: var(--border);
        }
        .canvas-ctrl-r .zoom-lbl { min-width: 46px; text-align: center; font-size: 12px; color: var(--text-dim); border: 1px solid var(--border); border-radius: var(--radius); }
        .statusbar { display: flex; align-items: center; gap: 14px; padding: 4px 10px; background: var(--panel-bg); border-top: 1px solid var(--border); font-size: 11px; color: var(--text-dim); }
        .statusbar .sb-item { display: flex; align-items: center; gap: 5px; }
        .statusbar .sep { flex: 1; }

        /* ---------- Inspector ---------- */
        .inspector { padding: 0 0 30px; }
        .insp-group { border-bottom: 1px solid var(--border); }
        .insp-group > .gh { display: flex; align-items: center; gap: 6px; padding: 7px 10px; cursor: pointer; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-dim); background: var(--dark-bg); }
        .insp-group > .gh:hover { color: #fff; }
        .insp-group > .gh .chev { transition: transform .15s; }
        .insp-group.collapsed > .gh .chev { transform: rotate(-90deg); }
        .insp-group.collapsed > .gc { display: none; }
        .gc { padding: 8px 10px; display: flex; flex-direction: column; gap: 8px; }
        .row { display: flex; align-items: center; gap: 8px; }
        .row > label { flex: 0 0 84px; color: var(--text-dim); font-size: 11px; }
        .row .ctl { flex: 1; display: flex; align-items: center; gap: 6px; min-width: 0; }
        .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .field { display: flex; flex-direction: column; gap: 3px; }
        .field > label { color: var(--text-mute); font-size: 10px; text-transform: uppercase; letter-spacing: .04em; }

        input[type=text], input[type=number], select, textarea {
            font-family: var(--body-font); font-size: 12px; width: 100%;
            background: var(--dark-bg); color: var(--text-light);
            border: 1px solid var(--border); border-radius: var(--radius); padding: 5px 7px;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary-color); }
        textarea { resize: vertical; min-height: 48px; }
        input[type=range] { width: 100%; accent-color: var(--primary-color); }
        input[type=color] { width: 34px; height: 28px; padding: 2px; background: var(--dark-bg); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; flex: 0 0 auto; }
        input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--primary-color); cursor: pointer; }
        .seg { display: flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
        .seg button { border: none; border-radius: 0; flex: 1; padding: 5px; background: var(--dark-bg); }
        .seg button.on { background: var(--primary-color); }
        .num-unit { position: relative; flex: 1; }
        .insp-empty { padding: 30px 16px; text-align: center; color: var(--text-mute); line-height: 1.7; }
        .mini { font-size: 10px; color: var(--text-mute); }
        .val-badge { font-size: 10px; color: var(--text-dim); min-width: 30px; text-align: right; }

        /* ---------- 9-slice editor ---------- */
        .ns-box { position: relative; margin: 4px auto 8px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; touch-action: none;
            background:
              linear-gradient(45deg, #0e0e10 25%, transparent 25%),
              linear-gradient(-45deg, #0e0e10 25%, transparent 25%),
              linear-gradient(45deg, transparent 75%, #0e0e10 75%),
              linear-gradient(-45deg, transparent 75%, #0e0e10 75%);
            background-size: 14px 14px; background-position: 0 0, 0 7px, 7px -7px, -7px 0; background-color: #0a0a0a; }
        .ns-box img { display: block; width: 100%; height: 100%; pointer-events: none; }
        .ns-line { position: absolute; background: var(--accent-color); box-shadow: 0 0 0 1px rgba(0,0,0,.6); z-index: 2; }
        .ns-line.v { top: 0; bottom: 0; width: 1px; margin-left: -0.5px; cursor: ew-resize; }
        .ns-line.h { left: 0; right: 0; height: 1px; margin-top: -0.5px; cursor: ns-resize; }
        .ns-line::after { content: ''; position: absolute; }
        .ns-line.v::after { top: 0; bottom: 0; left: -4px; right: -4px; }
        .ns-line.h::after { left: 0; right: 0; top: -4px; bottom: -4px; }
        .ns-center { position: absolute; pointer-events: none; border: 1px dashed rgba(156,163,175,.5); z-index: 1; }

        /* ---------- Modal ---------- */
        .modal-back { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal-back.open { display: flex; }
        .modal {
            background: var(--panel-bg); border: 1px solid var(--border); border-radius: var(--radius);
            box-shadow: var(--shadow-lg); width: 760px; max-width: 94vw; max-height: 90vh; display: flex; flex-direction: column;
        }
        .modal.sm { width: 440px; }
        .modal.lg { width: 920px; }
        .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .modal-head h3 { font-size: 15px; }
        .modal-body { padding: 16px; overflow-y: auto; min-height: 0; }
        .modal-foot { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
        .x-close { cursor: pointer; padding: 4px 8px; background: transparent; border: none; font-size: 16px; color: var(--text-dim); }
        .x-close:hover { color: #fff; background: transparent; }

        table.data { width: 100%; border-collapse: collapse; font-size: 12px; }
        table.data th, table.data td { text-align: left; padding: 7px 8px; border-bottom: 1px solid var(--border); }
        table.data th { color: var(--text-dim); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: .04em; }
        table.data tr:hover td { background: var(--surface-2); }
        .tag { display: inline-block; background: var(--surface-3); border-radius: 10px; padding: 1px 8px; font-size: 10px; margin: 1px; }
        .lang-edit { width: 84px; background: var(--dark-bg); color: var(--text-light); border: 1px solid var(--primary-color); border-radius: var(--radius); padding: 3px 6px; font-size: 12px; font-family: ui-monospace, 'DejaVu Sans Mono', monospace; }
        .lang-edit:focus { outline: none; border-color: var(--accent-color); }
        /* Google Fonts browser */
        .gf-list { max-height: 400px; overflow-y: auto; border: 1px solid var(--border); border-radius: var(--radius); background: var(--dark-bg); }
        .gf-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-bottom: 1px solid var(--border); }
        .gf-row:last-child { border-bottom: none; }
        .gf-meta { flex: 1; display: flex; flex-direction: column; gap: 1px; min-width: 0; }
        .gf-fam { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .gf-cat { font-size: 10px; color: var(--text-dim); text-transform: capitalize; }
        .gf-w { width: 74px; flex: 0 0 auto; background: var(--surface-2); color: var(--text-light); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; font-size: 12px; }
        .help { font-size: 11px; color: var(--text-mute); line-height: 1.6; }
        .help code { background: var(--surface-2); padding: 1px 4px; border-radius: 2px; color: var(--accent-color); }

        .radio-card { display: flex; gap: 8px; }
        .radio-card label { flex: 1; border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; cursor: pointer; display: flex; flex-direction: column; gap: 4px; background: var(--surface-2); }
        .radio-card label:hover { border-color: var(--primary-color); }
        .radio-card input { display: none; }
        .radio-card input:checked + .rc-body { color: #fff; }
        .radio-card label:has(input:checked) { border-color: var(--primary-color); background: rgba(107,114,128,.25); }
        .rc-title { font-weight: 600; }
        .rc-desc { font-size: 10px; color: var(--text-mute); }
        .lang-pick { display: flex; flex-wrap: wrap; gap: 6px; }
        .lang-pick label { display: inline-flex; align-items: center; gap: 5px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px 8px; cursor: pointer; }
        .lang-pick label:has(input:checked) { border-color: var(--primary-color); background: rgba(107,114,128,.25); }

        /* ---------- Toast ---------- */
        #toasts { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .toast { background: var(--surface-3); border: 1px solid var(--border); border-left: 3px solid var(--primary-color); border-radius: var(--radius); padding: 9px 14px; box-shadow: var(--shadow-lg); font-size: 12px; max-width: 420px; animation: tin .2s ease; }
        .toast.warn { border-left-color: var(--warn); }
        .toast.err { border-left-color: var(--danger); }
        .toast.ok { border-left-color: var(--ok); }
        @keyframes tin { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

        .progress { height: 6px; background: var(--surface-2); border-radius: 3px; overflow: hidden; margin-top: 8px; }
        .progress > div { height: 100%; background: var(--primary-color); width: 0; transition: width .1s; }
        .kbd { font-family: monospace; background: var(--surface-2); border: 1px solid var(--border); border-radius: 3px; padding: 0 5px; font-size: 11px; }
        .hidden { display: none !important; }
    </style>
</head>

<body>
    <div id="app">
        <!-- TOOLBAR -->
        <div class="topbar">
            <div class="brand"><span class="logo">🌐</span><span>Image Localizer</span></div>
            <div class="tb-group">
                <button id="btn-new" title="New project">New</button>
                <button id="btn-open" title="Open project (.licproj)">Open</button>
                <button id="btn-save" title="Save project">Save</button>

'use strict';

/* =========================================================================
   Localization Image Composer — single-file editor.
   Sections: utils · zip · model · history · localization · fonts ·
             render · canvas-view · selection · hierarchy · inspector ·
             assets · loc-manager · font-manager · export · project · init

/* ---------------------------- Utilities -------------------------------- */
const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
const uid = (p = 'id') => p + '_' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-3);
const deepClone = (o) => (typeof structuredClone === 'function' ? structuredClone(o) : JSON.parse(JSON.stringify(o)));
const round = (n, d = 2) => { const m = 10 ** d; return Math.round(n * m) / m; };
const escapeHtml = (s) => String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

function el(tag, attrs = {}, ...kids) {
    const n = document.createElement(tag);
    for (const k in attrs) {
        const v = attrs[k];
        if (k === 'class') n.className = v;
        else if (k === 'style') n.style.cssText = v;
        else if (k === 'html') n.innerHTML = v;
        else if (k === 'text') n.textContent = v;
        else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2), v);
        else if (v !== null && v !== undefined && v !== false) n.setAttribute(k, v === true ? '' : v);
    }
    for (const c of kids) { if (c == null) continue; n.append(c.nodeType ? c : document.createTextNode(c)); }
    return n;
}

let _toastTimer = [];
function toast(msg, type = '', ms = 3000) {
    const t = el('div', { class: 'toast ' + type, text: msg });
    $('#toasts').append(t);
    const id = setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 200); }, ms);
    _toastTimer.push(id);
    if (_toastTimer.length > 6) clearTimeout(_toastTimer.shift());
}

function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = el('a', { href: url, download: filename });
    document.body.append(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 4000);
}

function readFileAsText(file) { return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsText(file); }); }
function readFileAsDataURL(file) { return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file); }); }
function readFileAsArrayBuffer(file) { return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsArrayBuffer(file); }); }
function dataURLToArrayBuffer(dataURL) {
    const b64 = dataURL.split(',')[1] || '';
    const bin = atob(b64); const len = bin.length; const bytes = new Uint8Array(len);
    for (let i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
    return bytes.buffer;
}
function arrayBufferToBase64(buf) {
    const bytes = new Uint8Array(buf); let bin = ''; const CH = 0x8000;
    for (let i = 0; i < bytes.length; i += CH) bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CH));
    return btoa(bin);
}
function arrayBufferToDataURL(buf, mime) { return 'data:' + mime + ';base64,' + arrayBufferToBase64(buf); }

/* ------------------------------- ZIP ----------------------------------- */
/* Minimal, dependency-free ZIP writer (STORE method) with correct CRC-32.   */
const CRC_TABLE = (() => {
    const t = new Uint32Array(256);
    for (let n = 0; n < 256; n++) {
        let c = n;
        for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
        t[n] = c >>> 0;
    }
    return t;
})();
function crc32(bytes) {
    let c = 0xFFFFFFFF;
    for (let i = 0; i < bytes.length; i++) c = CRC_TABLE[(c ^ bytes[i]) & 0xFF] ^ (c >>> 8);
    return (c ^ 0xFFFFFFFF) >>> 0;
}
function utf8Bytes(str) { return new TextEncoder().encode(str); }

// dosDateTime from JS Date -> [time, date] 16-bit each
function dosDateTime(d) {
    const time = (d.getHours() << 11) | (d.getMinutes() << 5) | (Math.floor(d.getSeconds() / 2));
    const date = ((d.getFullYear() - 1980) << 9) | ((d.getMonth() + 1) << 5) | d.getDate();
    return [time & 0xFFFF, date & 0xFFFF];
}

/* files: [{ name, data:Uint8Array }] -> Blob */
function buildZip(files) {
    const now = new Date();
    const [dtime, ddate] = dosDateTime(now);
    const chunks = [];
    const central = [];
    let offset = 0;

    const u16 = (v) => { const b = new Uint8Array(2); b[0] = v & 0xFF; b[1] = (v >>> 8) & 0xFF; return b; };
    const u32 = (v) => { const b = new Uint8Array(4); b[0] = v & 0xFF; b[1] = (v >>> 8) & 0xFF; b[2] = (v >>> 16) & 0xFF; b[3] = (v >>> 24) & 0xFF; return b; };

    for (const f of files) {
        const nameBytes = utf8Bytes(f.name);
        const data = f.data;
        const crc = crc32(data);
        const size = data.length;
        // Local file header
        const local = [
            u32(0x04034b50), u16(20), u16(0x0800 /*UTF-8*/), u16(0 /*store*/),
            u16(dtime), u16(ddate), u32(crc), u32(size), u32(size),
            u16(nameBytes.length), u16(0), nameBytes, data
        ];
        for (const c of local) chunks.push(c);
        const localLen = local.reduce((s, c) => s + c.length, 0);
        // Central directory record
        central.push([
            u32(0x02014b50), u16(20), u16(20), u16(0x0800), u16(0),
            u16(dtime), u16(ddate), u32(crc), u32(size), u32(size),
            u16(nameBytes.length), u16(0), u16(0), u16(0), u16(0), u32(0),
            u32(offset), nameBytes
        ]);
        offset += localLen;
    }

    const centralStart = offset;
    let centralSize = 0;
    for (const rec of central) { for (const c of rec) { chunks.push(c); centralSize += c.length; } }

    chunks.push(u32(0x06054b50), u16(0), u16(0), u16(central.length), u16(central.length),
        u32(centralSize), u32(centralStart), u16(0));

    return new Blob(chunks, { type: 'application/zip' });
}

/* ------------------------------ Model ---------------------------------- */
const APP_VERSION = 1;
const STORAGE_KEY = 'lic_autosave_v1';

function newProject() {
    const pg = newPage('Main Menu', 1080, 1920);
    return {
        version: APP_VERSION,
        name: 'Untitled',
        defaultResolution: { width: 1080, height: 1920 },
        pages: [pg],
        assets: { images: {}, fonts: {} },
        localization: { files: [] },
        fontAssignment: { global: null, perLanguage: {} },
        exportSettings: { format: 'png', quality: 0.92, naming: 'suffix', organize: 'folders', languages: null }
    };
}

function newPage(name, w, h) {
    return {
        id: uid('page'), name: name || 'Page',
        resolution: (w && h) ? { width: w, height: h } : null, // null => inherit default
        bgFill: newFill({ type: 'solid', color: '#1e1e22' }), bgOn: true,
        objects: [] // index = z-order (last = top)
    };
}

function baseObj(type, name, x, y, w, h) {
    return { id: uid('obj'), type, name, x, y, width: w, height: h, rotation: 0, alpha: 1, visible: true, locked: false };
}
function newTextObject(x, y) {
    return Object.assign(baseObj('text', 'Text', x, y, 480, 140), {
        key: '', fallback: 'Sample Text',
        fontId: null, fontSize: 64, fontWeight: 400, bold: false, italic: false,
        color: '#ffffff', align: 'center', valign: 'middle',
        letterSpacing: 0, lineSpacing: 1.2,
        outlineWidth: 0, outlineColor: '#000000',
        shadow: false, shadowColor: '#000000', shadowBlur: 4, shadowOffsetX: 2, shadowOffsetY: 2,
        autoShrink: true, minFontSize: 12
    });
}
function newImageObject(x, y, assetId, w, h) {
    return Object.assign(baseObj('image', 'Image', x, y, w || 400, h || 400), {
        assetId: assetId || null, scale: 1, tintEnabled: false, tint: '#ffffff',
        flipX: false, flipY: false, blur: 0, glow: 0, glowColor: '#ffd479',
        shadow: false, shadowColor: '#000000', shadowBlur: 8, shadowOffsetX: 0, shadowOffsetY: 6,
        hueShift: 0, brightness: 100, contrast: 100,
        // When no asset is assigned, the object renders this fill (replaces the old "rect").
        fill: newFill(),
        // 9-slice border scaling. innerAssetId fills only the stretched center region.
        nineSlice: { enabled: false, left: 32, top: 32, right: 32, bottom: 32 },
        innerAssetId: null
    });
}

/* ----------------------- Fill system (shared) --------------------------- *
 * A single, extensible fill abstraction used by BOTH page backgrounds and
 * texture-less image objects. Add a new entry to FILL_TYPES and it instantly
 * works everywhere (inspector UI + canvas rendering). Each type provides:
 *   label   — name shown in the type dropdown
 *   fields  — (fill) => array of inspector rows
 *   paint   — (ctx, fill, x, y, w, h) => fills that rectangle
 * --------------------------------------------------------------------------*/
const FILL_DEFAULTS = { type: 'solid', color: '#6b7280', color1: '#6b7280', color2: '#111114', angle: 90, kind: 'linear', size: 32 };
function newFill(over) { return Object.assign({}, FILL_DEFAULTS, over); }
function normFill(f) { return (f && typeof f === 'object') ? Object.assign({}, FILL_DEFAULTS, f) : newFill(); }

const FILL_TYPES = {
    solid: {
        label: 'Solid',
        fields: (f) => [row('Color', _fillColor(f, 'color'))],
        paint: (ctx, f, x, y, w, h) => { ctx.fillStyle = f.color || '#000'; ctx.fillRect(x, y, w, h); }
    },
    gradient: {
        label: 'Gradient',
        fields: (f) => [
            row('Kind', _fillSelect(f, 'kind', [{ value: 'linear', label: 'Linear' }, { value: 'radial', label: 'Radial' }])),
            row('Color A', _fillColor(f, 'color1')),
            row('Color B', _fillColor(f, 'color2')),
            row('Angle', _fillRange(f, 'angle', 0, 360, 1, '°'))
        ],
        paint: (ctx, f, x, y, w, h) => {
            const cx = x + w / 2, cy = y + h / 2;
            let g;
            if (f.kind === 'radial') {
                g = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w, h) / 2 || 1);
            } else {
                const a = (f.angle || 0) * D2R, dx = Math.cos(a), dy = Math.sin(a);
                const half = (Math.abs(dx) * w + Math.abs(dy) * h) / 2 || 1;
                g = ctx.createLinearGradient(cx - dx * half, cy - dy * half, cx + dx * half, cy + dy * half);
            }
            g.addColorStop(0, f.color1 || '#000'); g.addColorStop(1, f.color2 || '#000');
            ctx.fillStyle = g; ctx.fillRect(x, y, w, h);
        }
    },
    checker: {
        label: 'Checkerboard',
        fields: (f) => [
            row('Color A', _fillColor(f, 'color1')),
            row('Color B', _fillColor(f, 'color2')),
            row('Cell px', _fillNum(f, 'size', { min: 2, step: 1 }))
        ],
        paint: (ctx, f, x, y, w, h) => {
            // Use a cached 2x2-cell tile pattern instead of looping every frame.
            const pat = checkerPattern(ctx, f);
            ctx.save();
            ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
            ctx.translate(x, y);            // align tile origin with the fill rect
            ctx.fillStyle = pat;
            ctx.fillRect(0, 0, w, h);
            ctx.restore();
        }
    }
};
/* Cached checkerboard tiles: key "color1|color2|size" -> CanvasPattern.
 * The pattern is a 2x2-cell tile, so it only rebuilds when the inputs change. */
const _checkerTiles = new Map();
function checkerPattern(ctx, f) {
    const s = Math.max(2, Math.round(f.size || 32));
    const c1 = f.color1 || '#000', c2 = f.color2 || '#fff';
    const key = c1 + '|' + c2 + '|' + s;
    let pat = _checkerTiles.get(key);
    if (!pat) {
        const tile = document.createElement('canvas');
        tile.width = s * 2; tile.height = s * 2;
        const tctx = tile.getContext('2d');
        tctx.fillStyle = c1; tctx.fillRect(0, 0, s * 2, s * 2);
        tctx.fillStyle = c2; tctx.fillRect(s, 0, s, s); tctx.fillRect(0, s, s, s);
        pat = ctx.createPattern(tile, 'repeat');
        _checkerTiles.set(key, pat);
    }
    return pat;
}
function paintFill(ctx, fill, x, y, w, h) {
    const f = fill || FILL_DEFAULTS;
    const t = FILL_TYPES[f.type] || FILL_TYPES.solid;
    t.paint(ctx, f, x, y, w, h);
}

/* Global editor state */
const state = {
    project: newProject(),
    pageId: null,
    selection: [],          // array of object ids
    previewLang: '__key',   // '__key' shows keys, otherwise language code
    zoom: 1, panX: 0, panY: 0,
    grid: false, snap: false, gridSize: 20,
    clipboard: null,
    dirty: false,
    fontFaces: {},          // fontId -> { family, coverage }
    imageCache: {},         // assetId -> HTMLImageElement
    fitReport: {}           // objId -> {fits, lang}
};
state.pageId = state.project.pages[0].id;

/* Accessors */
function getPage(id) { return state.project.pages.find(p => p.id === (id || state.pageId)); }
function curPage() { return getPage(state.pageId); }
function pageResolution(pg) { pg = pg || curPage(); return pg.resolution || state.project.defaultResolution; }
function curObjects() { return curPage().objects; }
function getObj(id) { return curObjects().find(o => o.id === id); }
function selectedObjects() { return state.selection.map(getObj).filter(Boolean); }
function firstSelected() { return getObj(state.selection[0]); }
function langList() {
    const set = new Set();
    for (const f of state.project.localization.files) for (const l of f.languages) set.add(l);
    return Array.from(set);
}

/* ----------------------------- History --------------------------------- */
const history = { past: [], future: [], committed: null, MAX: 120 };

function initHistory() { history.committed = deepClone(state.project); history.past = []; history.future = []; }

/* Call after any committed mutation to the project. */
function commit() {
    if (!history.committed) initHistory();
    history.past.push(history.committed);
    if (history.past.length > history.MAX) history.past.shift();
    history.committed = deepClone(state.project);
    history.future.length = 0;
    markDirty();
    scheduleAutosave();
    refreshAll();
}

function restoreSnapshot(snap) {
    state.project = deepClone(snap);
    // validate page + selection
    if (!getPage(state.pageId)) state.pageId = state.project.pages[0] && state.project.pages[0].id;
    const ids = new Set(curObjects().map(o => o.id));
    state.selection = state.selection.filter(id => ids.has(id));
    ensureAssetsLoaded();
    refreshAll();
    updateUndoButtons();
}

function undo() {
    if (!history.past.length) return;
    history.future.push(history.committed);
    history.committed = history.past.pop();
    restoreSnapshot(history.committed);
    toast('Undo', '', 900);
}
function redo() {
    if (!history.future.length) return;
    history.past.push(history.committed);
    history.committed = history.future.pop();
    restoreSnapshot(history.committed);
    toast('Redo', '', 900);
}
function updateUndoButtons() {
    $('#btn-undo').disabled = !history.past.length;
    $('#btn-redo').disabled = !history.future.length;
}

function markDirty() { state.dirty = true; }

/* Central refresh — re-renders every dependent UI surface. */
let _rafPending = false;
function refreshAll() {
    renderPageTabs();
    renderHierarchy();
    renderAssets();
    renderInspector();
    renderCanvas();
    updateStatus();
    updateUndoButtons();
    updateResLabel();
    updatePreviewLangOptions();
}
function requestCanvas() {
    if (_rafPending) return;
    _rafPending = true;
    requestAnimationFrame(() => { _rafPending = false; renderCanvas(); });
}

/* Autosave */
let _autosaveTimer = null;
function scheduleAutosave() {
    if (_autosaveTimer) clearTimeout(_autosaveTimer);
    _autosaveTimer = setTimeout(doAutosave, 1200);
}
function doAutosave() {
    try {
        const payload = JSON.stringify({ savedAt: Date.now(), project: state.project });
        localStorage.setItem(STORAGE_KEY, payload);
        const d = new Date();
        $('#sb-auto').textContent = 'Autosaved ' + d.toLocaleTimeString();
    } catch (e) {
        $('#sb-auto').textContent = 'Autosave failed (storage full)';
        console.warn('Autosave failed', e);
    }
}

/* -------------------------- Localization -------------------------------- */
const KNOWN_LANGS = new Set(['en', 'tr', 'de', 'fr', 'es', 'it', 'pt', 'ru', 'pl', 'nl', 'sv', 'no', 'da', 'fi',
    'cs', 'sk', 'hu', 'ro', 'el', 'uk', 'ja', 'ko', 'zh', 'zh-cn', 'zh-tw', 'ar', 'he', 'hi', 'th', 'vi', 'id',
    'ms', 'pt-br', 'es-419', 'en-us', 'en-gb']);
function isLangCode(s) {
    if (!s) return false;
    const k = String(s).trim().toLowerCase();
    if (KNOWN_LANGS.has(k)) return true;
    return /^[a-z]{2,3}(-[a-z0-9]{2,4})?$/i.test(k) && k.length <= 6;
}

function parseCSV(text) {
    const rows = []; let row = []; let field = ''; let i = 0; let inQ = false;
    text = text.replace(/^﻿/, '');
    while (i < text.length) {
        const c = text[i];
        if (inQ) {
            if (c === '"') { if (text[i + 1] === '"') { field += '"'; i += 2; continue; } inQ = false; i++; continue; }
            field += c; i++; continue;
        }
        if (c === '"') { inQ = true; i++; continue; }
        if (c === ',') { row.push(field); field = ''; i++; continue; }
        if (c === '\r') { i++; continue; }
        if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; i++; continue; }
        field += c; i++;

    }
    ctx.restore();
    ctx.filter = 'none';
    try { ctx.letterSpacing = '0px'; } catch (e) {}
}

function drawGrid(ctx, res) {
    const g = state.gridSize;
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = 0; x <= res.width; x += g) { ctx.moveTo(x + 0.5, 0); ctx.lineTo(x + 0.5, res.height); }
    for (let y = 0; y <= res.height; y += g) { ctx.moveTo(0, y + 0.5); ctx.lineTo(res.width, y + 0.5); }
    ctx.stroke();
    ctx.restore();
}

function recomputeFit() { requestCanvas(); }

/* ---------------------------- Canvas view ------------------------------- */
function applyStageTransform() {
    const st = $('#stage');
    st.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.zoom})`;
}
function canvasToScreen(cx, cy) { return { x: state.panX + cx * state.zoom, y: state.panY + cy * state.zoom }; }
function screenToCanvas(clientX, clientY) {
    const r = $('#canvas-wrap').getBoundingClientRect();
    return { x: (clientX - r.left - state.panX) / state.zoom, y: (clientY - r.top - state.panY) / state.zoom };
}
function rotatePt(px, py, cx, cy, ang) {
    const dx = px - cx, dy = py - cy, ca = Math.cos(ang), sa = Math.sin(ang);
    return { x: cx + dx * ca - dy * sa, y: cy + dx * sa + dy * ca };
}

function renderCanvas() {
    const pg = curPage();
    if (!pg) return;
    const res = pageResolution(pg);
    const cv = $('#view');
    if (cv.width !== res.width) cv.width = res.width;
    if (cv.height !== res.height) cv.height = res.height;
    cv.style.width = res.width + 'px';
    cv.style.height = res.height + 'px';
    const ctx = cv.getContext('2d');
    state.fitReport = {};
    renderPageToCtx(ctx, pg, state.previewLang, { fitOut: state.fitReport });
    if (state.grid) drawGrid(ctx, res);
    applyStageTransform();
    computeWarnings();
    renderSelectionOverlay();
    updateFitWarning();
}

const HANDLE_DEFS = [
    ['nw', 0, 0], ['n', .5, 0], ['ne', 1, 0], ['e', 1, .5],
    ['se', 1, 1], ['s', .5, 1], ['sw', 0, 1], ['w', 0, .5]
];

function renderSelectionOverlay() {
    const ov = $('#overlay');
    ov.innerHTML = '';
    const pg = curPage(); if (!pg) return;

    // warning markers (overflow / font coverage) for all text objects
    for (const obj of pg.objects) {
        if (!obj.visible) continue;
        const warn = state.objWarn[obj.id];
        if (warn && (warn.overflow || (warn.fontMissing && warn.fontMissing.length)) && !state.selection.includes(obj.id)) {
            ov.append(makeBox(obj, 'sel-box warn'));
        }
    }

    const sel = selectedObjects();
    for (const obj of sel) {
        const isText = obj.type === 'text';
        const warn = state.objWarn[obj.id];
        const cls = (isText ? 'safe-box' : 'sel-box') + ((warn && (warn.overflow || (warn.fontMissing && warn.fontMissing.length))) ? ' warn' : '');
        ov.append(makeBox(obj, cls));
    }

    // handles only for a single, unlocked selection
    if (sel.length === 1 && !sel[0].locked) {
        const obj = sel[0];
        const cx = obj.x + obj.width / 2, cy = obj.y + obj.height / 2;
        const ang = (obj.rotation || 0) * D2R;
        for (const [name, fx, fy] of HANDLE_DEFS) {
            const lp = rotatePt(obj.x + obj.width * fx, obj.y + obj.height * fy, cx, cy, ang);
            const s = canvasToScreen(lp.x, lp.y);
            const h = el('div', { class: 'handle ' + name, 'data-handle': name });
            h.style.left = (s.x - 5) + 'px'; h.style.top = (s.y - 5) + 'px';
            h.addEventListener('pointerdown', (e) => startResize(e, name));
            ov.append(h);
        }
        // rotation handle + line
        const nLocal = rotatePt(cx, obj.y, cx, cy, ang);
        const nScr = canvasToScreen(nLocal.x, nLocal.y);
        const rLocal = rotatePt(cx, obj.y - 26 / state.zoom, cx, cy, ang);
        const rScr = canvasToScreen(rLocal.x, rLocal.y);
        const line = el('div', { class: 'rot-line' });
        const len = Math.hypot(rScr.x - nScr.x, rScr.y - nScr.y);
        line.style.left = nScr.x + 'px'; line.style.top = nScr.y + 'px';
        line.style.height = len + 'px';
        line.style.transformOrigin = '0 0';
        line.style.transform = `rotate(${Math.atan2(rScr.y - nScr.y, rScr.x - nScr.x) - Math.PI / 2}rad)`;
        ov.append(line);
        const rh = el('div', { class: 'handle rot', 'data-handle': 'rotate', title: 'Rotate' });
        rh.style.left = (rScr.x - 5) + 'px'; rh.style.top = (rScr.y - 5) + 'px';
        rh.addEventListener('pointerdown', startRotate);
        ov.append(rh);
    }
}

function makeBox(obj, cls) {
    const s = canvasToScreen(obj.x, obj.y);
    const b = el('div', { class: cls });
    b.style.left = s.x + 'px'; b.style.top = s.y + 'px';
    b.style.width = (obj.width * state.zoom) + 'px';
    b.style.height = (obj.height * state.zoom) + 'px';
    if (obj.rotation) { b.style.transformOrigin = 'center'; b.style.transform = `rotate(${obj.rotation}deg)`; }
    return b;
}

/* zoom / pan */
function setZoom(z, anchorClientX, anchorClientY) {
    const old = state.zoom;
    z = clamp(z, 0.05, 8);
    if (z === old) return;
    const r = $('#canvas-wrap').getBoundingClientRect();
    const ax = (anchorClientX !== undefined) ? anchorClientX - r.left : r.width / 2;
    const ay = (anchorClientY !== undefined) ? anchorClientY - r.top : r.height / 2;
    // keep the canvas point under the anchor fixed
    state.panX = ax - (ax - state.panX) * (z / old);
    state.panY = ay - (ay - state.panY) * (z / old);
    state.zoom = z;
    updateZoomLabel();
    renderCanvas();
}
function updateZoomLabel() { $('#zoom-label').textContent = Math.round(state.zoom * 100) + '%'; }
function fitToScreen() {
    const pg = curPage(); const res = pageResolution(pg);
    const r = $('#canvas-wrap').getBoundingClientRect();
    const pad = 60;
    const z = Math.min((r.width - pad) / res.width, (r.height - pad) / res.height);
    state.zoom = clamp(z, 0.05, 8);
    state.panX = (r.width - res.width * state.zoom) / 2;
    state.panY = (r.height - res.height * state.zoom) / 2;
    updateZoomLabel();
    renderCanvas();
}

/* warnings */
function computeWarnings() {
    state.objWarn = {};
    const lang = state.previewLang;
    for (const obj of curObjects()) {
        if (obj.type !== 'text') continue;
        const fit = state.fitReport[obj.id];
        const overflow = fit ? !fit.fits : false;
        const fontMissing = checkFontCoverage(obj, lang);
        if (overflow || fontMissing.length) state.objWarn[obj.id] = { overflow, fontMissing };
    }
}
function updateFitWarning() {
    let overflow = 0, fontw = 0;
    for (const id in state.objWarn) { if (state.objWarn[id].overflow) overflow++; if (state.objWarn[id].fontMissing.length) fontw++; }
    const pill = $('#fit-warn');
    if (overflow || fontw) {
        pill.classList.add('show');
        const parts = [];
        if (overflow) parts.push(overflow + ' overflow');
        if (fontw) parts.push(fontw + ' font');
        $('#fit-warn-text').textContent = parts.join(' · ');
    } else pill.classList.remove('show');
}

function updateStatus() {
    const sel = selectedObjects();
    if (!sel.length) { $('#sb-sel').textContent = 'No selection'; $('#sb-pos').textContent = ''; }
    else if (sel.length === 1) {
        const o = sel[0];
        $('#sb-sel').textContent = `${o.name} (${o.type})`;
        $('#sb-pos').textContent = `x ${Math.round(o.x)}  y ${Math.round(o.y)}  ·  ${Math.round(o.width)}×${Math.round(o.height)}  ·  ${Math.round(o.rotation || 0)}°`;
    } else { $('#sb-sel').textContent = sel.length + ' selected'; $('#sb-pos').textContent = ''; }
    $('#sb-proj').textContent = state.project.name + (state.dirty ? ' *' : '');
}
function updateResLabel() {
    const res = pageResolution();
    $('#res-label').textContent = res.width + '×' + res.height;
    const pg = curPage();
    $('#page-bg-on').checked = !!pg.bgOn;
}
state.objWarn = {};

/* --------------------------- Interaction -------------------------------- */
let drag = null;
state.spaceDown = false;

function pointInObj(obj, x, y) {
    const cx = obj.x + obj.width / 2, cy = obj.y + obj.height / 2;
    const p = rotatePt(x, y, cx, cy, -(obj.rotation || 0) * D2R);
    return p.x >= obj.x && p.x <= obj.x + obj.width && p.y >= obj.y && p.y <= obj.y + obj.height;
}
function hitTest(x, y) {
    const objs = curObjects();
    for (let i = objs.length - 1; i >= 0; i--) {
        const o = objs[i];
        if (!o.visible || o.locked) continue;
        if (pointInObj(o, x, y)) return o;
    }
    // second pass allow locked (so it can be selected even if not movable)
    for (let i = objs.length - 1; i >= 0; i--) {
        const o = objs[i];
        if (!o.visible) continue;
        if (pointInObj(o, x, y)) return o;
    }
    return null;
}
function snapV(v) { return state.snap ? Math.round(v / state.gridSize) * state.gridSize : v; }

function selectOnly(id) { state.selection = id ? [id] : []; refreshSelectionUI(); }
function refreshSelectionUI() { renderHierarchy(); renderInspector(); renderSelectionOverlay(); updateStatus(); }

function setupCanvasInteraction() {
    const wrap = $('#canvas-wrap');

    wrap.addEventListener('pointerdown', (e) => {
        if (e.target.classList.contains('handle')) return; // handled by handle listeners
        if (e.target.closest('.canvas-ctrl, .canvas-ctrl-r')) return; // let overlay buttons receive their own clicks
        wrap.setPointerCapture(e.pointerId);
        const panMode = state.spaceDown || e.button === 1;
        if (panMode) {
            drag = { mode: 'pan', sx: e.clientX, sy: e.clientY, px: state.panX, py: state.panY };
            wrap.style.cursor = 'grabbing';
            return;
        }
        if (e.button !== 0) return;
        const p = screenToCanvas(e.clientX, e.clientY);
        const hit = hitTest(p.x, p.y);
        if (hit) {
            if (e.shiftKey) {
                const i = state.selection.indexOf(hit.id);
                if (i >= 0) state.selection.splice(i, 1); else state.selection.push(hit.id);
            } else if (!state.selection.includes(hit.id)) {
                state.selection = [hit.id];
            }
            refreshSelectionUI();
            const movable = selectedObjects().filter(o => !o.locked);
            drag = {
                mode: 'move', moved: false, sx: p.x, sy: p.y,
                items: movable.map(o => ({ id: o.id, x: o.x, y: o.y }))
            };
        } else {
            if (!e.shiftKey) { state.selection = []; refreshSelectionUI(); }
            drag = { mode: 'marquee', sx: p.x, sy: p.y, base: e.shiftKey ? state.selection.slice() : [] };
        }
    });

    wrap.addEventListener('pointermove', (e) => {
        if (!drag) {
            // hover cursor
            return;
        }
        if (drag.mode === 'pan') {
            state.panX = drag.px + (e.clientX - drag.sx);
            state.panY = drag.py + (e.clientY - drag.sy);
            applyStageTransform(); renderSelectionOverlay();
            return;
        }
        const p = screenToCanvas(e.clientX, e.clientY);
        if (drag.mode === 'move') {
            let dx = p.x - drag.sx, dy = p.y - drag.sy;
            if (Math.abs(dx) + Math.abs(dy) > 0.5) drag.moved = true;
            for (const it of drag.items) {
                const o = getObj(it.id); if (!o) continue;
                o.x = snapV(it.x + dx); o.y = snapV(it.y + dy);
            }
            requestCanvas(); renderInspectorLight(); updateStatus();
        } else if (drag.mode === 'resize') {
            doResize(p);
        } else if (drag.mode === 'rotate') {
            doRotate(p, e.shiftKey);
        } else if (drag.mode === 'marquee') {
            drag.cur = p; drawMarquee();
        }
    });

    wrap.addEventListener('pointerup', (e) => {
        if (!drag) return;
        wrap.style.cursor = '';
        if (drag.mode === 'marquee') {
            finalizeMarquee();
            $('#overlay').querySelectorAll('.marquee').forEach(n => n.remove());
        }
        const changed = (drag.mode === 'move' && drag.moved) || drag.mode === 'resize' || drag.mode === 'rotate';
        drag = null;
        if (changed) commit(); else refreshSelectionUI();
    });

    // wheel zoom / pan
    wrap.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (e.ctrlKey || e.metaKey || !e.shiftKey) {
            const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
            setZoom(state.zoom * factor, e.clientX, e.clientY);
        } else {
            state.panX -= e.deltaX; state.panY -= e.deltaY;
            applyStageTransform(); renderSelectionOverlay();
        }
    }, { passive: false });
}

function drawMarquee() {
    let m = $('#overlay .marquee');
    if (!m) { m = el('div', { class: 'marquee' }); $('#overlay').append(m); }
    const a = canvasToScreen(Math.min(drag.sx, drag.cur.x), Math.min(drag.sy, drag.cur.y));
    const w = Math.abs(drag.cur.x - drag.sx) * state.zoom, h = Math.abs(drag.cur.y - drag.sy) * state.zoom;
    m.style.left = a.x + 'px'; m.style.top = a.y + 'px'; m.style.width = w + 'px'; m.style.height = h + 'px';
}
function finalizeMarquee() {
    if (!drag.cur) { return; }
    const x1 = Math.min(drag.sx, drag.cur.x), y1 = Math.min(drag.sy, drag.cur.y);
    const x2 = Math.max(drag.sx, drag.cur.x), y2 = Math.max(drag.sy, drag.cur.y);
    const sel = new Set(drag.base);
    for (const o of curObjects()) {
        if (!o.visible) continue;
        const cx = o.x + o.width / 2, cy = o.y + o.height / 2;
        if (cx >= x1 && cx <= x2 && cy >= y1 && cy <= y2) sel.add(o.id);
    }
    state.selection = Array.from(sel);
    refreshSelectionUI();
}

function startResize(e, handle) {
    e.stopPropagation(); e.preventDefault();
    const obj = firstSelected(); if (!obj || obj.locked) return;
    const a = (obj.rotation || 0) * D2R;
    const ux = { x: Math.cos(a), y: Math.sin(a) }, uy = { x: -Math.sin(a), y: Math.cos(a) };
    const c0 = { x: obj.x + obj.width / 2, y: obj.y + obj.height / 2 };
    drag = {
        mode: 'resize', handle,
        ux, uy, c0, w0: obj.width, h0: obj.height,
        movesE: handle.includes('e'), movesW: handle.includes('w'),
        movesN: handle.includes('n'), movesS: handle.includes('s')
    };
    $('#canvas-wrap').setPointerCapture(e.pointerId);
}
function doResize(p) {
    const o = firstSelected(); if (!o) return;
    const { ux, uy, c0, w0, h0 } = drag;
    const d = { x: p.x - c0.x, y: p.y - c0.y };
    const du = d.x * ux.x + d.y * ux.y;
    const dv = d.x * uy.x + d.y * uy.y;
    const MIN = 8;
    let Lu = -w0 / 2, Ru = w0 / 2, Tv = -h0 / 2, Bv = h0 / 2;
    if (drag.movesE) Ru = Math.max(Lu + MIN, du);
    if (drag.movesW) Lu = Math.min(Ru - MIN, du);
    if (drag.movesS) Bv = Math.max(Tv + MIN, dv);
    if (drag.movesN) Tv = Math.min(Bv - MIN, dv);
    let newW = Ru - Lu, newH = Bv - Tv;
    const cu = (Lu + Ru) / 2, cv = (Tv + Bv) / 2;
    const nc = { x: c0.x + ux.x * cu + uy.x * cv, y: c0.y + ux.y * cu + uy.y * cv };
    if (state.snap) { newW = Math.max(MIN, snapV(newW)); newH = Math.max(MIN, snapV(newH)); }
    o.width = round(newW, 1); o.height = round(newH, 1);
    o.x = round(nc.x - newW / 2, 1); o.y = round(nc.y - newH / 2, 1);
    drag.moved = true;
    requestCanvas(); renderInspectorLight(); updateStatus();
}
function startRotate(e) {
    e.stopPropagation(); e.preventDefault();
    const obj = firstSelected(); if (!obj || obj.locked) return;
    const c = { x: obj.x + obj.width / 2, y: obj.y + obj.height / 2 };
    const p = screenToCanvas(e.clientX, e.clientY);
    drag = { mode: 'rotate', c, startMouse: Math.atan2(p.y - c.y, p.x - c.x), startRot: obj.rotation || 0 };
    $('#canvas-wrap').setPointerCapture(e.pointerId);
}
function doRotate(p, snap15) {
    const o = firstSelected(); if (!o) return;
    const ang = Math.atan2(p.y - drag.c.y, p.x - drag.c.x);
    let deg = drag.startRot + (ang - drag.startMouse) / D2R;
    if (snap15) deg = Math.round(deg / 15) * 15;
    o.rotation = round((deg % 360 + 360) % 360, 1);
    drag.moved = true;
    requestCanvas(); renderInspectorLight(); updateStatus();
}

/* ---------------------- Object ops & Hierarchy -------------------------- */
function placePos(w, h) {
    const res = pageResolution();
    const n = curObjects().length;
    const off = (n % 6) * 24;
    return { x: Math.round((res.width - w) / 2 + off), y: Math.round((res.height - h) / 2 + off) };
}
function addObject(obj) {
    curObjects().push(obj);
    state.selection = [obj.id];
    commit();
    return obj;
}
function addText() { const o = newTextObject(0, 0); const p = placePos(o.width, o.height); o.x = p.x; o.y = p.y; addObject(o); toast('Text added'); }
function addImage(assetId) {
    const ids = Object.keys(state.project.assets.images);
    const aid = assetId || ids[ids.length - 1] || null;
    let w = 400, h = 400;
    if (aid && state.imageCache[aid] && state.imageCache[aid].naturalWidth) {
        const im = state.imageCache[aid]; const res = pageResolution();
        const sc = Math.min(1, (res.width * 0.5) / im.naturalWidth, (res.height * 0.5) / im.naturalHeight);
        w = Math.round(im.naturalWidth * sc); h = Math.round(im.naturalHeight * sc);
    }
    const o = newImageObject(0, 0, aid, w, h); const p = placePos(w, h); o.x = p.x; o.y = p.y;
    if (aid && state.project.assets.images[aid]) o.name = state.project.assets.images[aid].name.replace(/\.[^.]+$/, '');
    else { o.name = 'Fill'; o.width = 400; o.height = 200; const p = placePos(o.width, o.height); o.x = p.x; o.y = p.y; }
    addObject(o);
    if (!aid) toast('Fill layer added — pick a color/gradient, or assign an asset', '', 2500);
}

function duplicateSelection() {
    const sel = selectedObjects(); if (!sel.length) return;
    const objs = curObjects(); const clones = [];
    for (const o of sel) {
        const c = deepClone(o); c.id = uid('obj'); c.x += 24; c.y += 24; c.name = o.name + ' copy';
        objs.push(c); clones.push(c.id);
    }
    state.selection = clones; commit();
}
function deleteSelection() {
    if (!state.selection.length) return;
    const set = new Set(state.selection);
    const pg = curPage();
    pg.objects = pg.objects.filter(o => !set.has(o.id));
    state.selection = [];
    commit();
}
function copySelection() {
    const sel = selectedObjects(); if (!sel.length) return;
    state.clipboard = sel.map(deepClone);
    toast(sel.length + ' copied', '', 1200);
}
function pasteClipboard() {
    if (!state.clipboard || !state.clipboard.length) return;
    const objs = curObjects(); const ids = [];
    for (const o of state.clipboard) {
        const c = deepClone(o); c.id = uid('obj'); c.x += 24; c.y += 24; objs.push(c); ids.push(c.id);
    }
    state.selection = ids; commit();
    toast(ids.length + ' pasted', '', 1200);
}
function moveLayer(dir) {
    const sel = selectedObjects(); if (sel.length !== 1) return;
    const objs = curObjects(); const i = objs.indexOf(sel[0]);
    const j = dir === 'up' ? i + 1 : i - 1; // up = higher z = later in array
    if (j < 0 || j >= objs.length) return;
    [objs[i], objs[j]] = [objs[j], objs[i]];
    commit();
}
function toggleVis(id) { const o = getObj(id); if (o) { o.visible = !o.visible; commit(); } }
function toggleLock(id) { const o = getObj(id); if (o) { o.locked = !o.locked; if (o.locked) state.selection = state.selection.filter(s => s !== id); commit(); } }
function renameObject(id, name) { const o = getObj(id); if (o) { o.name = name || o.type; commit(); } }

const TYPE_ICON = { text: 'T', image: '🖼' };
function fillSwatchCss(f) {
    f = f || FILL_DEFAULTS;
    if (f.type === 'gradient') return `linear-gradient(${(f.angle || 0) + 90}deg, ${f.color1}, ${f.color2})`;
    if (f.type === 'checker') return f.color1;
    return f.color || f.color1 || '#444';
}
function layerThumb(o) {
    if (o.type === 'image') {
        const asset = o.assetId && state.project.assets.images[o.assetId];
        if (asset && asset.data) return el('span', { class: 'ico thumb' }, el('img', { src: asset.data, alt: '' }));
        // texture-less image → show its fill as a swatch
        return el('span', { class: 'ico swatch', style: 'background:' + fillSwatchCss(o.fill) });
    }
    return el('span', { class: 'ico', text: TYPE_ICON[o.type] || '?' });
}

function renderHierarchy() {
    const list = $('#layer-list');
    list.innerHTML = '';
    const objs = curObjects();
    if (!objs.length) {
        list.append(el('div', { class: 'empty-hint', html: 'No layers yet.<br>Use <b>+ Text / + Image</b> to add objects.<br><span class="mini">An image with no asset becomes a color / gradient / checker fill.</span>' }));
        return;
    }
    for (let i = objs.length - 1; i >= 0; i--) {
        const o = objs[i];
        const sel = state.selection.includes(o.id);
        const row = el('div', {
            class: 'layer' + (sel ? ' selected' : '') + (o.visible ? '' : ' is-hidden') + (o.locked ? ' locked' : ''),
            'data-id': o.id, draggable: 'true'
        });
        const ico = layerThumb(o);
        const nm = el('span', { class: 'nm', text: o.name });
        nm.addEventListener('dblclick', (e) => { e.stopPropagation(); beginRename(nm, o); });
        const keyChip = (o.type === 'text' && o.key) ? el('span', { class: 'key-chip', text: o.key, title: 'Loc key: ' + o.key }) : null;
        const vis = el('span', { class: 'vis', text: o.visible ? '👁' : '⌀', title: 'Show/Hide' });
        vis.addEventListener('click', (e) => { e.stopPropagation(); toggleVis(o.id); });
        const lock = el('span', { class: 'lock', text: o.locked ? '🔒' : '🔓', title: 'Lock/Unlock' });
        lock.addEventListener('click', (e) => { e.stopPropagation(); toggleLock(o.id); });
        const del = el('span', { class: 'layer-del', text: '🗑', title: 'Delete layer' });
        del.addEventListener('click', (e) => {
            e.stopPropagation();
            const pg = curPage();
            pg.objects = pg.objects.filter(obj => obj.id !== o.id);
            state.selection = state.selection.filter(id => id !== o.id);
            commit();
        });
        row.append(ico, nm);
        if (keyChip) row.append(keyChip);
        row.append(vis, lock, del);
        row.addEventListener('click', (e) => layerClick(e, o, i));
        // drag reorder
        row.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', o.id); e.dataTransfer.effectAllowed = 'move'; });
        row.addEventListener('dragover', (e) => {
            e.preventDefault();
            const r = row.getBoundingClientRect();
            const top = (e.clientY - r.top) < r.height / 2;
            row.classList.toggle('dragover-top', top);
            row.classList.toggle('dragover-bottom', !top);
        });
        row.addEventListener('dragleave', () => row.classList.remove('dragover-top', 'dragover-bottom'));
        row.addEventListener('drop', (e) => {
            e.preventDefault();
            const dragged = e.dataTransfer.getData('text/plain');
            const r = row.getBoundingClientRect();
            const before = (e.clientY - r.top) < r.height / 2; // before in display = above = higher z
            row.classList.remove('dragover-top', 'dragover-bottom');
            reorderLayer(dragged, o.id, before);
        });
        list.append(row);
    }
}
function layerClick(e, o, idx) {
    if (e.metaKey || e.ctrlKey) {
        const i = state.selection.indexOf(o.id);
        if (i >= 0) state.selection.splice(i, 1); else state.selection.push(o.id);
    } else if (e.shiftKey && state.selection.length) {
        const objs = curObjects();
        const last = objs.findIndex(x => x.id === state.selection[state.selection.length - 1]);
        const lo = Math.min(last, idx), hi = Math.max(last, idx);
        const range = objs.slice(lo, hi + 1).map(x => x.id);
        state.selection = Array.from(new Set(state.selection.concat(range)));
    } else {
        state.selection = [o.id];
    }
    refreshSelectionUI();
}
function beginRename(span, o) {
    const inp = el('input', { type: 'text', value: o.name });
    span.textContent = ''; span.append(inp); inp.focus(); inp.select();
    const done = () => { renameObject(o.id, inp.value.trim()); };
    inp.addEventListener('blur', done);
    inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') inp.blur(); else if (e.key === 'Escape') { inp.value = o.name; inp.blur(); } e.stopPropagation(); });
}
function reorderLayer(draggedId, targetId, before) {
    if (draggedId === targetId) return;
    const objs = curObjects();
    const di = objs.findIndex(o => o.id === draggedId);
    if (di < 0) return;
    const [moved] = objs.splice(di, 1);
    let ti = objs.findIndex(o => o.id === targetId);
    // display "before" (above) means higher z => insert AFTER target in array
    if (before) ti = ti + 1;
    objs.splice(ti, 0, moved);
    commit();
}

/* ----------------------------- Inspector -------------------------------- */
state.inspCollapsed = new Set();
const fmtNum = (n) => (Math.round((n || 0) * 100) / 100).toString();

function liveUpdate() { requestCanvas(); updateStatus(); }

function bindNum(obj, prop, opts = {}) {
    const inp = el('input', { type: 'number', value: fmtNum(obj[prop]) });
    if (opts.step != null) inp.step = opts.step;
    if (opts.min != null) inp.min = opts.min;
    if (opts.max != null) inp.max = opts.max;
    if (opts.id) inp.id = opts.id;
    inp.addEventListener('input', () => {
        let v = parseFloat(inp.value); if (isNaN(v)) return;
        if (opts.min != null) v = Math.max(opts.min, v);
        if (opts.max != null) v = Math.min(opts.max, v);
        applyToTargets(obj, prop, v, opts.targetsAll); liveUpdate();

    inp.addEventListener('change', () => commit());

}
function bindRange(obj, prop, min, max, step, opts = {}) {

function bindColor(obj, prop, opts = {}) {

/* Shared 9-slice editor box. Returns the draggable box element plus helpers so
   both the inline inspector editor and the zoomable modal reuse one engine. */
function makeNineSliceBox(o, img, asset, initialScale) {
    const ns = o.nineSlice;
    const iw = img.naturalWidth, ih = img.naturalHeight;
    let scale = initialScale, dispW = 1, dispH = 1;
    const box = el('div', { class: 'ns-box' });
    box.append(el('img', { src: asset.data, draggable: 'false' }));
    const center = el('div', { class: 'ns-center' }); box.append(center);
    const lines = {
        left: el('div', { class: 'ns-line v' }), right: el('div', { class: 'ns-line v' }),
        top: el('div', { class: 'ns-line h' }), bottom: el('div', { class: 'ns-line h' })
    };
    for (const k in lines) box.append(lines[k]);
    const inputs = {};
    function place() {
        lines.left.style.left = (ns.left * scale) + 'px';
        lines.right.style.left = (dispW - ns.right * scale) + 'px';
        lines.top.style.top = (ns.top * scale) + 'px';
        lines.bottom.style.top = (dispH - ns.bottom * scale) + 'px';
        center.style.left = (ns.left * scale) + 'px';
        center.style.top = (ns.top * scale) + 'px';
        center.style.width = Math.max(0, dispW - (ns.left + ns.right) * scale) + 'px';
        center.style.height = Math.max(0, dispH - (ns.top + ns.bottom) * scale) + 'px';
    }
    function relayout(s) {
        if (s != null) scale = s;
        dispW = Math.max(1, Math.round(iw * scale));
        dispH = Math.max(1, Math.round(ih * scale));
        box.style.width = dispW + 'px'; box.style.height = dispH + 'px';
        place();
    }
    function syncInputs() { for (const s in inputs) if (document.activeElement !== inputs[s]) inputs[s].value = ns[s]; }
    function bindLine(side) {
        const line = lines[side];
        line.addEventListener('pointerdown', (e) => {
            e.preventDefault(); e.stopPropagation(); line.setPointerCapture(e.pointerId);
            const rect = box.getBoundingClientRect();
            const move = (ev) => {
                const px = clamp((ev.clientX - rect.left) / scale, 0, iw), py = clamp((ev.clientY - rect.top) / scale, 0, ih);
                if (side === 'left') ns.left = clamp(Math.round(px), 0, iw - ns.right - 1);
                else if (side === 'right') ns.right = clamp(Math.round(iw - px), 0, iw - ns.left - 1);
                else if (side === 'top') ns.top = clamp(Math.round(py), 0, ih - ns.bottom - 1);
                else if (side === 'bottom') ns.bottom = clamp(Math.round(ih - py), 0, ih - ns.top - 1);
                place(); syncInputs(); requestCanvas();
            };
            const up = () => { window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); commit(); };
            window.addEventListener('pointermove', move); window.addEventListener('pointerup', up);
        });
    }
    for (const k in lines) bindLine(k);
    function numField(side, label) {
        const i = el('input', { type: 'number', min: 0, value: ns[side] });
        i.addEventListener('input', () => { let v = Math.max(0, parseInt(i.value, 10) || 0); ns[side] = v; place(); requestCanvas(); });
        i.addEventListener('change', () => commit());
        inputs[side] = i;
        return field(label, i);
    }
    relayout(scale);
    return { box, relayout, place, syncInputs, numField, get iw() { return iw; }, get ih() { return ih; } };
}

function nineSliceEditor(o) {
    const asset = o.assetId && state.project.assets.images[o.assetId];
    const img = o.assetId && state.imageCache[o.assetId];
    if (!asset || !img || !img.naturalWidth) return el('div', { class: 'mini', text: 'Assign a main asset above to edit 9-slice borders.' });
    const iw = img.naturalWidth, ih = img.naturalHeight;
    const scale = Math.min(248 / iw, 220 / ih, 1);
    const ed = makeNineSliceBox(o, img, asset, scale);
    return el('div', {}, ed.box,
        el('div', { class: 'row2' }, ed.numField('left', 'Left'), ed.numField('right', 'Right')),
        el('div', { class: 'row2' }, ed.numField('top', 'Top'), ed.numField('bottom', 'Bottom')),
        el('button', { class: 'icon', style: 'margin-top:8px;width:100%', text: '⛶ Detailed editor', onclick: () => openNineSliceModal(o) }));
}

/* Full-size, zoomable 9-slice editor in a modal. */
function openNineSliceModal(o) {
    const back = $('#modal-generic');
    const asset = o.assetId && state.project.assets.images[o.assetId];
    const img = o.assetId && state.imageCache[o.assetId];
    if (!asset || !img || !img.naturalWidth) { toast('Assign a main asset first', 'warn'); return; }
    const iw = img.naturalWidth, ih = img.naturalHeight;
    const fitScale = () => Math.min(620 / iw, 460 / ih);
    let scale = Math.min(fitScale(), 1);
    const ed = makeNineSliceBox(o, img, asset, scale);

    const stage = el('div', {
        style: 'overflow:auto;max-width:680px;max-height:480px;background:#0a0a0a;border:1px solid var(--border);'
            + 'border-radius:var(--radius);padding:20px;display:flex;align-items:center;justify-content:center;'
    }, ed.box);
    const zlabel = el('span', { class: 'mini', style: 'min-width:48px;text-align:center', text: Math.round(scale * 100) + '%' });
    const setScale = (s) => { scale = clamp(s, 0.05, 8); ed.relayout(scale); zlabel.textContent = Math.round(scale * 100) + '%'; };

    const controls = el('div', { class: 'row', style: 'gap:6px;align-items:center;margin-bottom:10px' },
        el('button', { class: 'icon', title: 'Zoom out', text: '−', onclick: () => setScale(scale / 1.25) }),
        zlabel,
        el('button', { class: 'icon', title: 'Zoom in', text: '+', onclick: () => setScale(scale * 1.25) }),
        el('button', { class: 'icon', title: 'Fit', text: 'Fit', onclick: () => setScale(Math.min(fitScale(), 1)) }),
        el('button', { class: 'icon', title: 'Actual size (100%)', text: '1:1', onclick: () => setScale(1) }),
        el('span', { class: 'mini', style: 'margin-left:auto', text: iw + '×' + ih + ' px' })
    );

    // ctrl/⌘ + wheel to zoom inside the stage
    stage.addEventListener('wheel', (e) => {
        if (!e.ctrlKey && !e.metaKey) return;
        e.preventDefault(); setScale(scale * (e.deltaY < 0 ? 1.1 : 1 / 1.1));
    }, { passive: false });

    const body = el('div', { style: 'width:680px;max-width:100%' },
        controls, stage,
        el('div', { class: 'row2', style: 'margin-top:12px' }, ed.numField('left', 'Left'), ed.numField('right', 'Right')),
        el('div', { class: 'row2' }, ed.numField('top', 'Top'), ed.numField('bottom', 'Bottom')),
        el('div', { class: 'mini', style: 'margin-top:8px', text: 'Drag the guide lines or edit the numbers. Ctrl/⌘ + scroll to zoom.' })
    );
    openModal(back, '⛶ 9-Slice Editor — ' + (asset.name || 'image'), body,
        [el('button', { class: 'primary', text: 'Done', onclick: () => { commit(); closeModal(back); renderInspector(); } })], 'lg');
}

function alignSel(mode) {
    const sel = selectedObjects(); if (sel.length < 2) return;
    const minX = Math.min(...sel.map(o => o.x)), maxX = Math.max(...sel.map(o => o.x + o.width));
    const minY = Math.min(...sel.map(o => o.y)), maxY = Math.max(...sel.map(o => o.y + o.height));
    for (const o of sel) {
        if (mode === 'left') o.x = minX;
        else if (mode === 'right') o.x = maxX - o.width;
        else if (mode === 'centerH') o.x = (minX + maxX) / 2 - o.width / 2;
        else if (mode === 'top') o.y = minY;
        else if (mode === 'bottom') o.y = maxY - o.height;
        else if (mode === 'centerV') o.y = (minY + maxY) / 2 - o.height / 2;
    }
    commit();
}

function deleteAsset(id) {
    const a = state.project.assets.images[id];

    // find every layer (and the page it lives on) that references this image
    const usage = [];
    for (const pg of state.project.pages) for (const o of pg.objects) if (o.type === 'image' && o.assetId === id) usage.push({ pg, o });
    const pageNames = Array.from(new Set(usage.map(u => u.pg.name)));

    if (usage.length) {

            ' (' + usage.length + ' layer' + (usage.length > 1 ? 's' : '') + ').')) return;

            'OK = remove those image layers.\nCancel = keep the layers (they will show a missing-image placeholder).');

    delete state.project.assets.images[id];

    for (const pg of state.project.pages) {

/* Recursively collect files from a FileSystemDirectoryEntry. */
function readDirEntry(dirEntry) {
    return new Promise(res => {
        const reader = dirEntry.createReader();
        const all = [];
        const read = () => reader.readEntries(async entries => {
            if (!entries.length) { res(all); return; }
            for (const e of entries) {
                if (e.isDirectory) { const sub = await readDirEntry(e); all.push(...sub); }
                else all.push(await new Promise((r, j) => e.file(r, j)));
            }
            read();
        });
        read();
    });
}
async function getLocFilesFromTransfer(dt) {
    const files = [];
    if (dt.items) {
        for (const item of Array.from(dt.items)) {
            const entry = item.webkitGetAsEntry && item.webkitGetAsEntry();
            if (entry) {
                if (entry.isDirectory) files.push(...(await readDirEntry(entry)));
                else files.push(await new Promise((r, j) => entry.file(r, j)));
            } else { const f = item.getAsFile(); if (f) files.push(f); }
        }
    } else files.push(...Array.from(dt.files));
    return files.filter(f => /\.(json|csv)$/i.test(f.name));
}

/* Re-map a single-language file to a different language code. */
function setLocFileLanguage(fileId, newLang) {
    newLang = slugLang(newLang);
    const f = state.project.localization.files.find(x => x.id === fileId);
    if (!f || f.languages.length !== 1) return;
    const old = f.languages[0];
    if (old === newLang) return;
    for (const k of f.keys) {
        if (f.data[k] && old in f.data[k]) { f.data[k][newLang] = f.data[k][old]; delete f.data[k][old]; }
    }
    f.languages = [newLang];
    commit(); refreshAll(); openLocManager();
}
function removeLocFile(id) {
    state.project.localization.files = state.project.localization.files.filter(f => f.id !== id);
    commit(); refreshAll(); openLocManager();

        const i = state.project.localization.files.findIndex(f => f.id === id);
