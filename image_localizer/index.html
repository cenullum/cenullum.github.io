/* ----- Google Fonts (dynamic browse + download) -----
   Index comes from the lightweight, CORS-enabled Fontsource catalog
   (api.fontsource.org, ~0.5MB, filtered to Google fonts). The actual font
   binaries are pulled straight from Google's own CDN via the css2 endpoint
   (fonts.googleapis.com + fonts.gstatic.com, both send Access-Control-Allow-Origin:*),
   so only the chosen family is downloaded — never the whole library. */
let _gfList = null;
async function loadGoogleFontsList() {
    if (_gfList) return _gfList;
    const res = await fetch('https://api.fontsource.org/v1/fonts');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const arr = await res.json();
    _gfList = arr.filter(f => f.type === 'google')
        .map(f => ({ id: f.id, family: f.family, category: f.category || '', weights: (f.weights && f.weights.length) ? f.weights : [400], subsets: f.subsets || [] }))
        .sort((a, b) => a.family.localeCompare(b.family));
    return _gfList;
}
async function fetchGoogleCss(family, weight) {
    const base = 'https://fonts.googleapis.com/css2?family=' + encodeURIComponent(family).replace(/%20/g, '+');
    let r = await fetch(base + (weight && weight !== 400 ? ':wght@' + weight : ''));
    if (!r.ok && weight && weight !== 400) r = await fetch(base); // fall back to default weight
    if (!r.ok) throw new Error('Google CSS request failed (' + r.status + ')');
    return r.text();
}
/* Already downloaded this family+weight? Return its asset id so we skip re-fetching. */
function findGoogleFontAsset(family, weight) {
    const fonts = state.project.assets.fonts;
    const w = weight || 400;
    for (const id in fonts) {
        const f = fonts[id];
        if (f.source === 'google' && f.family === family && (f.weight || 400) === w) return id;
    }
    return null;
}
async function downloadGoogleFont(entry, weight) {
    const existing = findGoogleFontAsset(entry.family, weight);
    if (existing) return existing; // already in the project — no need to download again
    const css = await fetchGoogleCss(entry.family, weight);
    const subsets = [];
    for (const block of css.split('@font-face')) {
        const m = block.match(/url\((https:\/\/[^)]+?\.woff2)\)/i);
        if (!m) continue;
        const ur = block.match(/unicode-range:\s*([^;]+);/i);
        subsets.push({ url: m[1], unicodeRange: ur ? ur[1].trim() : null });
    }
    if (!subsets.length) throw new Error('No downloadable font files found for this family.');
    const subAssets = [];
    for (const s of subsets) {
        const r = await fetch(s.url);
        if (!r.ok) throw new Error('Font file fetch failed (' + r.status + ')');
        subAssets.push({ data: arrayBufferToDataURL(await r.arrayBuffer(), 'font/woff2'), unicodeRange: s.unicodeRange });
    }
    const id = uid('font');
    state.project.assets.fonts[id] = {
        name: entry.family + (weight && weight !== 400 ? ' ' + weight : ''),
        file: entry.family, source: 'google', family: entry.family, weight: weight || 400,
        format: 'woff2', subsets: subAssets
    };
    await registerFont(id, state.project.assets.fonts[id]);
    recomputeFit(); commit();
    // if the font manager is currently open, refresh it so the new font appears immediately
    if ($('#modal-font').classList.contains('open')) openFontManager();
    return id;
}
function gfRow(entry) {
    const meta = el('div', { class: 'gf-meta' },

/* ------------------------------ Export ---------------------------------- */
const FORMAT_INFO = { png: { mime: 'image/png', ext: 'png', lossy: false }, jpg: { mime: 'image/jpeg', ext: 'jpg', lossy: true }, webp: { mime: 'image/webp', ext: 'webp', lossy: true } };
function slug(s) { return String(s).trim().toLowerCase().replace(/[^a-z0-9._-]+/g, '_').replace(/^_+|_+$/g, '') || 'page'; }

function toBlobAsync(canvas, mime, quality) {
    return new Promise((res) => canvas.toBlob((b) => res(b), mime, quality));
}
async function renderPageToBlob(page, lang, fmt, quality) {
    const res = pageResolution(page);
    const c = document.createElement('canvas'); c.width = res.width; c.height = res.height;
    const ctx = c.getContext('2d');
    const bgFallback = (fmt.mime === 'image/jpeg' && !page.bgOn) ? '#ffffff' : null;
    renderPageToCtx(ctx, page, lang, { bgFallback });
    const blob = await toBlobAsync(c, fmt.mime, quality);
    return new Uint8Array(await blob.arrayBuffer());
}

function exportFilename(pageName, lang, withSuffix, fmtExt) {
    const base = slug(pageName);
    const suff = (withSuffix && lang && lang !== '__key') ? '_' + lang : '';
    return base + suff + '.' + fmtExt;
}

        const sl = selectedLangs();
        const pages = state.project.pages.filter(p => pageChecks[p.id].checked);
        if (!pages.length || !sl.length) { toast('Select at least one page and language', 'warn'); return; }
        const withSuffix = suffixChk.checked || (org === 'flat' && sl.length > 1);
        // persist settings
        es.format = fmtKey; es.quality = parseFloat(quality.value); es.naming = suffixChk.checked ? 'suffix' : 'plain';
        es.organize = org; es.languages = langs.length ? sl.slice() : null;

        runBtn.disabled = true; progress.style.display = '';
        const bar = progress.firstChild;
        const total = pages.length * sl.length; let done = 0;
        const files = []; const seen = new Set();
        try {
            for (const pg of pages) {
                for (const lang of sl) {
                    const data = await renderPageToBlob(pg, lang, fmt, es.quality);
                    let name = exportFilename(pg.name, lang, withSuffix, fmt.ext);
                    let path = (org === 'folders' && lang !== '__key' ? slug(lang) + '/' : '') + name;
                    if (seen.has(path)) { path = path.replace('.' + fmt.ext, '_' + slug(pg.id).slice(-4) + '.' + fmt.ext); }
                    seen.add(path);
                    files.push({ name: path, data });
                    done++; bar.style.width = Math.round(done / total * 100) + '%';
                    await new Promise(r => setTimeout(r, 0)); // yield for UI
                }
            }
            const zip = buildZip(files);
            downloadBlob(zip, slug(state.project.name) + '_export.zip');
            toast('Exported ' + files.length + ' image(s)', 'ok');
            closeModal($('#modal-export'));
        } catch (e) {
            console.error(e); toast('Export failed: ' + e.message, 'err', 6000);
            runBtn.disabled = false;
        }
    });

    openModal($('#modal-export'), 'Export Wizard', body, [el('button', { text: 'Cancel', onclick: () => closeModal($('#modal-export')) }), runBtn]);
}

function loadProject(proj, opts = {}) {
    proj = migrateProject(proj);
    state.project = proj;
    state.pageId = proj.pages[0] ? proj.pages[0].id : null;
    state.selection = [];
    state.imageCache = {}; state.fontFaces = {};
    _nsCache.clear();
    ensureAssetsLoaded();
    initHistory();
    refreshAll();
    fitToScreen();
    state.dirty = false;
    if (!opts.silent) toast('Project loaded: ' + proj.name, 'ok');
}
function migrateProject(p) {
    if (!p || typeof p !== 'object') throw new Error('Invalid project file');
    p.version = p.version || 1;
    p.name = p.name || 'Untitled';
    p.defaultResolution = p.defaultResolution || { width: 1080, height: 1920 };
    p.assets = p.assets || { images: {}, fonts: {} };
    p.assets.images = p.assets.images || {};
    p.assets.fonts = p.assets.fonts || {};
    p.localization = p.localization || { files: [] };
    p.localization.files = p.localization.files || [];
    p.fontAssignment = p.fontAssignment || { global: null, perLanguage: {} };
    p.fontAssignment.perLanguage = p.fontAssignment.perLanguage || {};
    p.exportSettings = p.exportSettings || { format: 'png', quality: 0.92, naming: 'suffix', organize: 'folders', languages: null };
    if (!Array.isArray(p.pages) || !p.pages.length) p.pages = [newPage('Page 1', 1920, 1080)];
    for (const pg of p.pages) {
        pg.id = pg.id || uid('page');
        pg.objects = pg.objects || [];
        if (!('bgOn' in pg)) pg.bgOn = false;
        // background fill — migrate legacy solid `bg` into the new fill engine
        if (!pg.bgFill) pg.bgFill = newFill({ type: 'solid', color: pg.bg || '#1e1e22' });
        else pg.bgFill = normFill(pg.bgFill);
        delete pg.bg;
        for (const o of pg.objects) {
            o.id = o.id || uid('obj');
            // legacy "rect" objects become texture-less image fills
            if (o.type === 'rect') {
                o.type = 'image';
                o.fill = newFill({ type: 'solid', color: o.color || '#6b7280' });
                o.assetId = null;
                delete o.color;
            }
            if (o.type === 'image') applyImageDefaults(o);
        }
    }
    return p;
}
/* Fill in any image-object fields missing from older saves (and converted rects). */
function applyImageDefaults(o) {
    const d = newImageObject(o.x, o.y, o.assetId, o.width, o.height);
    for (const k in d) if (!(k in o)) o[k] = d[k];
    o.fill = normFill(o.fill);
    if (!o.nineSlice || typeof o.nineSlice !== 'object') o.nineSlice = { enabled: false, left: 32, top: 32, right: 32, bottom: 32 };
    else for (const s of ['left', 'top', 'right', 'bottom']) if (!(s in o.nineSlice)) o.nineSlice[s] = 32;
    if (!('innerAssetId' in o)) o.innerAssetId = null;
}
function saveProject() {
    const data = JSON.stringify(state.project);
    const fname = slug(state.project.name) + '.licproj';
    downloadBlob(new Blob([data], { type: 'application/json' }), fname);
    state.dirty = false; updateStatus();
    toast('Saved ' + fname, 'ok');
}
async function openProjectFile() {
    const files = await pickFiles('.licproj,.json', false);
    if (!files || !files[0]) return;
    try {
        const text = await readFileAsText(files[0]);
        const proj = JSON.parse(text);
        loadProject(proj);
    } catch (e) { toast('Could not open project: ' + e.message, 'err', 6000); }
}
function newProjectAction() {
    if (state.dirty && !confirm('Start a new project? Unsaved changes will be lost (autosave is kept until you change the new project).')) return;
    loadProject(newProject(), { silent: true });
    state.project.name = 'Untitled';
    toast('New project created', 'ok');
}
function renameProjectPrompt() {
    const inp = el('input', { type: 'text', value: state.project.name, style: 'width:100%' });
    const body = el('div', {}, el('label', { class: 'mini', text: 'Project name (used for export/zip filenames)' }), inp);
    const save = el('button', { class: 'primary', text: 'Save', onclick: () => { state.project.name = inp.value.trim() || 'Untitled'; closeModal($('#modal-generic')); commit(); } });
    openModal($('#modal-generic'), 'Project Name', body, [el('button', { text: 'Cancel', onclick: () => closeModal($('#modal-generic')) }), save], 'sm');
    setTimeout(() => { inp.focus(); inp.select(); }, 30);
}

/* ---------------------------- Keyboard ---------------------------------- */
function isTyping(t) {
    return t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.tagName === 'SELECT' || t.isContentEditable);
}
function anyModalOpen() { return $$('.modal-back.open').length > 0; }

function setupKeyboard() {
    window.addEventListener('keydown', (e) => {
        const mod = e.ctrlKey || e.metaKey;
        if (e.code === 'Space' && !isTyping(e.target) && !state.spaceDown) {
            state.spaceDown = true; $('#canvas-wrap').style.cursor = 'grab'; e.preventDefault(); return;
        }
        if (mod && e.key.toLowerCase() === 's') { e.preventDefault(); saveProject(); return; }
        if (anyModalOpen()) { if (e.key === 'Escape') closeAllModals(); return; }
        if (isTyping(e.target)) return;

        if (mod && e.key.toLowerCase() === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
        if (mod && (e.key.toLowerCase() === 'y' || (e.key.toLowerCase() === 'z' && e.shiftKey))) { e.preventDefault(); redo(); return; }
        if (mod && e.key.toLowerCase() === 'c') { e.preventDefault(); copySelection(); return; }
        if (mod && e.key.toLowerCase() === 'v') { e.preventDefault(); pasteClipboard(); return; }
        if (mod && e.key.toLowerCase() === 'd') { e.preventDefault(); duplicateSelection(); return; }
        if (mod && e.key.toLowerCase() === 'a') { e.preventDefault(); state.selection = curObjects().map(o => o.id); refreshSelectionUI(); return; }
        if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); deleteSelection(); return; }
        if (e.key === 'Escape') { state.selection = []; refreshSelectionUI(); return; }
        if (e.key === '+' || e.key === '=') { e.preventDefault(); setZoom(state.zoom * 1.15); return; }
        if (e.key === '-' || e.key === '_') { e.preventDefault(); setZoom(state.zoom / 1.15); return; }
        if (e.key.startsWith('Arrow') && state.selection.length) {
            e.preventDefault();
            const step = e.shiftKey ? 10 : 1;
            const dx = e.key === 'ArrowLeft' ? -step : e.key === 'ArrowRight' ? step : 0;
            const dy = e.key === 'ArrowUp' ? -step : e.key === 'ArrowDown' ? step : 0;
            for (const o of selectedObjects()) if (!o.locked) { o.x += dx; o.y += dy; }
            commit();
        }
    });
    window.addEventListener('keyup', (e) => {
        if (e.code === 'Space') { state.spaceDown = false; $('#canvas-wrap').style.cursor = ''; }
    });
}

/* --------------------------- Panel resizers ----------------------------- */
function setupResizers() {
    const drag = (handle, dock, side) => {
        handle.addEventListener('pointerdown', (e) => {
            e.preventDefault(); handle.setPointerCapture(e.pointerId);
            const startX = e.clientX, startW = dock.getBoundingClientRect().width;
            const move = (ev) => {
                const dx = ev.clientX - startX;
                let w = side === 'left' ? startW + dx : startW - dx;
                w = clamp(w, 200, 560);
                dock.style.width = w + 'px';
                renderSelectionOverlay();
            };
            const up = () => { window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
            window.addEventListener('pointermove', move); window.addEventListener('pointerup', up);
        });
    };
    drag($('#resize-left'), $('#left-dock'), 'left');
    drag($('#resize-right'), $('#right-dock'), 'right');
}

/* --------------------------- Canvas drop -------------------------------- */
function setupCanvasDrop() {
    const wrap = $('#canvas-wrap');
    wrap.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
    wrap.addEventListener('drop', async (e) => {
        e.preventDefault();
        const p = screenToCanvas(e.clientX, e.clientY);
        const assetId = e.dataTransfer.getData('application/x-lic-asset');
        if (assetId && state.project.assets.images[assetId]) {
            placeImageAt(assetId, p); return;
        }
        if (e.dataTransfer.files && e.dataTransfer.files.length) {
            const before = Object.keys(state.project.assets.images);
            await importAssets(e.dataTransfer.files);
            const after = Object.keys(state.project.assets.images).filter(id => !before.includes(id));
            if (after.length) placeImageAt(after[0], p);
        }
    });
}
function placeImageAt(assetId, p) {
    const im = state.imageCache[assetId];
    let w = 400, h = 400;
    if (im && im.naturalWidth) {
        const res = pageResolution();
        const sc = Math.min(1, (res.width * 0.5) / im.naturalWidth, (res.height * 0.5) / im.naturalHeight);
        w = Math.round(im.naturalWidth * sc); h = Math.round(im.naturalHeight * sc);
    }
    const o = newImageObject(Math.round(p.x - w / 2), Math.round(p.y - h / 2), assetId, w, h);
    o.name = state.project.assets.images[assetId].name.replace(/\.[^.]+$/, '');
    addObject(o);
}

/* ------------------------------- Init ----------------------------------- */
function setupDockTabs() {
    $$('.dock-tab').forEach(tab => tab.addEventListener('click', () => {
        $$('.dock-tab').forEach(t => t.classList.toggle('active', t === tab));
        const which = tab.dataset.dock;
        $('#panel-layers').classList.toggle('active', which === 'layers');
        $('#panel-assets').classList.toggle('active', which === 'assets');
    }));
}

function setupToolbar() {
    $('#btn-new').onclick = newProjectAction;
    $('#btn-open').onclick = openProjectFile;
    $('#btn-save').onclick = saveProject;
    $('#btn-undo').onclick = undo;
    $('#btn-redo').onclick = redo;
    $('#btn-add-text').onclick = addText;
    $('#btn-add-image').onclick = () => addImage();
    $('#btn-zoom-in').onclick = () => setZoom(state.zoom * 1.15);
    $('#btn-zoom-out').onclick = () => setZoom(state.zoom / 1.15);
    $('#btn-zoom-fit').onclick = fitToScreen;
    $('#btn-grid').onclick = () => { state.grid = !state.grid; $('#btn-grid').classList.toggle('on', state.grid); renderCanvas(); };
    $('#btn-snap').onclick = () => { state.snap = !state.snap; $('#btn-snap').classList.toggle('on', state.snap); };
    const gsz = $('#grid-size'); gsz.value = state.gridSize;
    gsz.addEventListener('input', () => {
        let v = parseInt(gsz.value, 10); if (isNaN(v)) return;
        state.gridSize = Math.max(2, Math.min(512, v));
        if (state.grid) renderCanvas();
    });
    gsz.addEventListener('change', () => { gsz.value = state.gridSize; });
    $('#btn-loc').onclick = openLocManager;
    $('#btn-fonts').onclick = openFontManager;
    $('#btn-legal').onclick = openLegalPanel;
    $('#btn-export').onclick = openExportWizard;

    $('#lyr-up').onclick = () => moveLayer('up');
    $('#lyr-down').onclick = () => moveLayer('down');
    $('#lyr-dup').onclick = duplicateSelection;
    $('#asset-import').onclick = async () => importAssets(await pickFiles('image/*', true));

    $('#preview-lang').addEventListener('change', (e) => { state.previewLang = e.target.value; renderCanvas(); renderInspector(); });
    $('#btn-page-res').onclick = openResolutionEditor;
    $('#btn-bg-edit').onclick = () => { state.selection = []; refreshSelectionUI(); toast('Background fill — edit it in the Inspector →', '', 2000); };
    $('#page-bg-on').addEventListener('change', (e) => { curPage().bgOn = e.target.checked; commit(); });
    $('#sb-proj').style.cursor = 'pointer';
    $('#sb-proj').title = 'Rename project';
    $('#sb-proj').addEventListener('click', renameProjectPrompt);

    const drop = $('#asset-drop');
    drop.onclick = async () => importAssets(await pickFiles('image/*', true));
    drop.addEventListener('dragover', (e) => { e.preventDefault(); drop.classList.add('over'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('over'));
    drop.addEventListener('drop', (e) => { e.preventDefault(); drop.classList.remove('over'); if (e.dataTransfer.files.length) importAssets(e.dataTransfer.files); });
}

function tryRestoreAutosave() {
    let saved = null;
    try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); } catch (e) {}
    if (saved && saved.project && saved.project.pages && saved.project.pages.length) {
        const when = new Date(saved.savedAt || Date.now()).toLocaleString();
        if (confirm('An autosaved project was found (' + when + ').\n\nOK = restore it, Cancel = start a new project.')) {
            loadProject(saved.project, { silent: true });
            toast('Autosave restored', 'ok');
            return true;
        }
    }
    return false;
}

function init() {
    window.addEventListener('error', (e) => { console.error(e.error || e.message); });
    setupDockTabs();
    setupToolbar();
    setupCanvasInteraction();
    setupCanvasDrop();
    setupKeyboard();
    setupResizers();
    window.addEventListener('resize', () => renderSelectionOverlay());
    window.addEventListener('beforeunload', (e) => { if (state.dirty) { e.preventDefault(); e.returnValue = ''; } });

    initHistory();
    if (!tryRestoreAutosave()) {
        ensureAssetsLoaded();
        refreshAll();
    }
    fitToScreen();
    toast('Welcome — add a layer, import localization, then Export.', '', 4000);
    // Warm only the Google Fonts *list* up front (a single ~0.5MB catalog request).
    // Font binaries are never fetched until the user clicks Download for a family.
    loadGoogleFontsList().catch(() => {});
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
    </script>
</body>
