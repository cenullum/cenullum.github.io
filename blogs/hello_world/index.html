<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World — Cenker Cennet</title>
    <meta name="description" content="My first blog post! About my game development journey and future plans.">
    <meta name="keywords" content="hello world, blog, game development, indie games, cenker cennet, cenullum">
    <meta name="author" content="Cenker Cennet">
    <meta property="og:title" content="Hello World — Cenker Cennet">
    <meta property="og:description" content="My first blog post! About my game development journey and future plans.">
    <meta property="og:url" content="https://cenullum.com/blogs/hello_world/">
    <meta property="og:type" content="article">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Hello World — Cenker Cennet">
    <meta name="twitter:description" content="My first blog post! About my game development journey and future plans.">
    <link rel="canonical" href="https://cenullum.com/blogs/hello_world/">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6b7280;
            --secondary-color: #4b5563;
            --accent-color: #9ca3af;
            --dark-bg: #050505;
            --light-bg: #19191b;
            --text-light: #fff;
            --text-dark: #333;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
            --gradient: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        }

        body {
            font-family: Verdana, Geneva, 'DejaVu Sans', Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-light);
            background: var(--dark-bg);
            min-height: 100vh;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        /* Topbar */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--dark-bg);
            border-bottom: 1px solid var(--primary-color);
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--light-bg);
            border: 1px solid var(--primary-color);
            border-radius: 3px;
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .nav-btn:hover {
            background: var(--primary-color);
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        .nav-btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .lang-switcher {
            display: flex;
            gap: 8px;
        }

        .lang-btn {
            padding: 8px 12px;
            background: var(--light-bg);
            border: 1px solid var(--primary-color);
            border-radius: 3px;
            color: var(--text-light);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: Verdana, Geneva, 'DejaVu Sans', Arial, sans-serif;
            font-size: 0.9rem;
        }

        .lang-btn:hover,
        .lang-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        /* Content */
        .content {
            max-width: 680px;
            margin: 0 auto;
            padding: 90px 20px 60px;
        }

        .blog-header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--primary-color);
        }

        .blog-title {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-light);
            line-height: 1.2;
        }

        .blog-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--accent-color);
            font-size: 0.85rem;
        }

        .blog-category {
            background: var(--primary-color);
            color: var(--text-light);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .blog-body {
            background: var(--light-bg);
            border-radius: 3px;
            padding: 36px;
            box-shadow: var(--shadow);
        }

        .blog-body h2 {
            font-size: 1.6rem;
            margin: 28px 0 12px;
            color: var(--accent-color);
            border-bottom: 1px solid var(--primary-color);
            padding-bottom: 8px;
        }

        .blog-body h3 {
            font-size: 1.25rem;
            margin: 20px 0 8px;
            color: var(--text-light);
        }

        .blog-body p {
            margin-bottom: 14px;
            line-height: 1.7;
        }

        .blog-body ul {
            margin: 12px 0 12px 20px;
        }

        .blog-body li {
            margin-bottom: 6px;
        }

        .blog-body blockquote {
            border-left: 3px solid var(--primary-color);
            padding-left: 16px;
            margin: 16px 0;
            font-style: italic;
            color: var(--accent-color);
        }

        .blog-body a {
            color: var(--accent-color);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .blog-body a:hover {
            color: var(--text-light);
            border-bottom-color: var(--accent-color);
        }

        .blog-image {
            max-width: 100%;
            height: auto;
            border-radius: 3px;
            margin: 20px 0;
            display: block;
            box-shadow: var(--shadow);
        }

        .rss-row {
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid var(--primary-color);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 3px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow);
            background: var(--secondary-color);
        }

        @media (max-width: 768px) {
            .topbar {
                padding: 10px 12px;
            }

            .content {
                padding: 76px 16px 40px;
            }

            .blog-body {
                padding: 24px 16px;
            }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <div class="topbar-left">
            <a href="https://cenullum.com/" class="nav-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
                Home
            </a>
            <a href="../" class="nav-btn">Blog</a>
        </div>
        <div class="lang-switcher">
            <button class="lang-btn" data-lang="tr">TR</button>
            <button class="lang-btn active" data-lang="en">EN</button>
        </div>
    </div>

    <div class="content">
        <div class="blog-header">
            <h1 class="blog-title">Hello World!</h1>
            <div class="blog-meta">
                <div class="meta-item">
                    <span>📅</span>
                    <span>2025-09-19</span>
                </div>
                <div class="meta-item">
                    <span>⏱️</span>
                    <span>3 min</span>
                </div>
                <span class="blog-category">Personal</span>
            </div>
        </div>

        <article class="blog-body">
            <p>Hello! This is my first blog post where I'll be sharing my game development journey with you.</p>
            <p>This is my cat image.</p>
            <img src="a.webp" alt="My cat" class="blog-image" style="width:50%;">
            <p><strong>P.S.</strong> Don't forget to follow the RSS feed to stay updated with my latest posts!</p>

            <div class="rss-row">
                <a href="../../rss.xml" class="btn">
                    <img src="../../rss_feed_logo.svg" alt="RSS" style="width:16px;height:16px;">
                    RSS Feed
                </a>
            </div>
        </article>
    </div>

    <script>
        (function () {
            const saved = localStorage.getItem('selectedLanguage') || 'en';
            applyLang(saved);

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    const lang = this.getAttribute('data-lang');
                    applyLang(lang);
                    localStorage.setItem('selectedLanguage', lang);
                });
            });

            function applyLang(lang) {
                document.querySelectorAll('.lang-btn').forEach(b => {
                    b.classList.toggle('active', b.getAttribute('data-lang') === lang);
                });
                document.documentElement.lang = lang;
            }
        })();
    </script>
</body>

</html>
