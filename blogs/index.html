<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — Cenker Cennet</title>
    <meta name="description" content="All blog posts by Cenker Cennet - Game Developer">
    <meta name="keywords" content="blog, game development, indie games, cenker cennet, cenullum">
    <meta name="author" content="Cenker Cennet">
    <meta property="og:title" content="Blog — Cenker Cennet">
    <meta property="og:description" content="All blog posts by Cenker Cennet - Game Developer">
    <meta property="og:url" content="https://cenullum.com/blogs/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Blog — Cenker Cennet">
    <meta name="twitter:description" content="All blog posts by Cenker Cennet - Game Developer">
    <link rel="canonical" href="https://cenullum.com/blogs/">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6b7280;
            --secondary-color: #4b5563;
            --accent-color: #9ca3af;
            --dark-bg: #050505;
            --light-bg: #19191b;
            --text-light: #fff;
            --text-dark: #333;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
            --gradient: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        }

        body {
            font-family: Verdana, Geneva, 'DejaVu Sans', Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-light);
            background: var(--dark-bg);
            min-height: 100vh;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        /* Topbar */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--dark-bg);
            border-bottom: 1px solid var(--primary-color);
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--light-bg);
            border: 1px solid var(--primary-color);
            border-radius: 3px;
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .home-btn:hover {
            background: var(--primary-color);
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        .home-btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .page-title {
            font-size: 1.1rem;
            color: var(--accent-color);
            font-weight: 600;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        .lang-switcher {
            display: flex;
            gap: 8px;
        }

        .lang-btn {
            padding: 8px 12px;
            background: var(--light-bg);
            border: 1px solid var(--primary-color);
            border-radius: 3px;
            color: var(--text-light);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: Verdana, Geneva, 'DejaVu Sans', Arial, sans-serif;
            font-size: 0.9rem;
        }

        .lang-btn:hover,
        .lang-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        /* Content */
        .content {
            max-width: 680px;
            margin: 0 auto;
            padding: 90px 20px 60px;
        }

        .section-heading {
            font-size: 2rem;
            margin-bottom: 32px;
            color: var(--text-light);
        }

        .blog-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .blog-item {
            background: var(--light-bg);
            border-radius: 3px;
            padding: 24px;
            border: 1px solid var(--primary-color);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .blog-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border-color: var(--accent-color);
        }

        .blog-item-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        .blog-item-title a {
            color: var(--text-light);
            text-decoration: none;
        }

        .blog-item-description {
            color: var(--accent-color);
            margin-bottom: 12px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .blog-item-meta {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .blog-date {
            color: var(--accent-color);
            font-size: 0.85rem;
        }

        .blog-category {
            background: var(--primary-color);
            color: var(--text-light);
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .rss-section {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--primary-color);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 3px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow);
            background: var(--secondary-color);
        }

        .lang-content {
            display: none;
        }

        .lang-content.active {
            display: block;
        }

        @media (max-width: 768px) {
            .topbar {
                padding: 10px 12px;
            }

            .page-title {
                display: none;
            }

            .content {
                padding: 76px 16px 40px;
            }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <div class="topbar-left">
            <a href="https://cenullum.com/" class="home-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
                Home
            </a>
            <span class="page-title">Blog</span>
        </div>
        <div class="lang-switcher">
            <button class="lang-btn" data-lang="tr">TR</button>
            <button class="lang-btn active" data-lang="en">EN</button>
        </div>
    </div>

    <div class="content">
        <div class="lang-content" data-lang="tr">
            <h1 class="section-heading">Blog Yazılarım</h1>
            <div class="blog-list">
                <div class="blog-item" onclick="window.location.href='./hello_world/'">
                    <h3 class="blog-item-title"><a href="./hello_world/">Hello World!</a></h3>
                    <p class="blog-item-description">İlk blog yazım! Oyun geliştirme yolculuğum ve gelecek planlarım hakkında.</p>
                    <div class="blog-item-meta">
                        <span class="blog-date">📅 2025-09-19</span>
                        <span class="blog-category">Personal</span>
                    </div>
                </div>
            </div>
            <div class="rss-section">
                <a href="../rss.xml" class="btn">
                    <img src="../rss_feed_logo.svg" alt="RSS" style="width:16px;height:16px;">
                    RSS Feed
                </a>
            </div>
        </div>

        <div class="lang-content active" data-lang="en">
            <h1 class="section-heading">Blog Posts</h1>
            <div class="blog-list">
                <div class="blog-item" onclick="window.location.href='./hello_world/'">
                    <h3 class="blog-item-title"><a href="./hello_world/">Hello World!</a></h3>
                    <p class="blog-item-description">My first blog post! About my game development journey and future plans.</p>
                    <div class="blog-item-meta">
                        <span class="blog-date">📅 2025-09-19</span>
                        <span class="blog-category">Personal</span>
                    </div>
                </div>
            </div>
            <div class="rss-section">
                <a href="../rss.xml" class="btn">
                    <img src="../rss_feed_logo.svg" alt="RSS" style="width:16px;height:16px;">
                    RSS Feed
                </a>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const saved = localStorage.getItem('selectedLanguage') || 'en';
            applyLang(saved);

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    const lang = this.getAttribute('data-lang');
                    applyLang(lang);
                    localStorage.setItem('selectedLanguage', lang);
                });
            });

            function applyLang(lang) {
                document.querySelectorAll('.lang-btn').forEach(b => {
                    b.classList.toggle('active', b.getAttribute('data-lang') === lang);
                });
                document.querySelectorAll('.lang-content').forEach(el => {
                    el.classList.toggle('active', el.getAttribute('data-lang') === lang);
                });
                document.documentElement.lang = lang;
            }
        })();
    </script>
</body>

</html>
